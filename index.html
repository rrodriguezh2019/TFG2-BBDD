<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visualizador Universidad - 3D VR Experience</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
    }
  </style>

  <!-- Botón reset vista - esquina inferior izquierda -->
  <button id="btn-reset-vista" onclick="resetVista()" title="Recentrar cámara (R)">↺</button>
  <style>
    #btn-reset-vista {
      position: fixed;
      bottom: 16px;
      left: 16px;
      z-index: 9999;
      background: rgba(0, 20, 30, 0.75);
      border: 1.5px solid #00E5FF;
      color: #00E5FF;
      font-size: 20px;
      width: 34px;
      height: 34px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      line-height: 1;
      transition: background 0.2s, box-shadow 0.2s;
    }
    #btn-reset-vista:hover {
      background: rgba(0, 229, 255, 0.18);
      box-shadow: 0 0 10px #00E5FF88;
    }
  </style>

  <script>
    // =========================
    // AUDIO SFX (tick / click)
    // =========================
    let sfxCtx = null;
    function playSfx(type) {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtx) return;
      if (!sfxCtx) sfxCtx = new AudioCtx();
      if (sfxCtx.state === "suspended") sfxCtx.resume();

      const now = sfxCtx.currentTime;
      const osc = sfxCtx.createOscillator();
      const gain = sfxCtx.createGain();

      const isHover = type === "hover";
      osc.type = isHover ? "triangle" : "sine";
      osc.frequency.value = isHover ? 980 : 520;

      const dur = isHover ? 0.04 : 0.08;
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.16, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + dur);

      osc.connect(gain).connect(sfxCtx.destination);
      osc.start(now);
      osc.stop(now + dur + 0.02);
    }

    function isEntityVisible(el) {
      let current = el;
      while (current && current.tagName !== "A-SCENE") {
        const vis = current.getAttribute("visible");
        if (vis === false || vis === "false") return false;
        current = current.parentElement;
      }
      return true;
    }

    // =========================
    // COMPONENTE INTERACTABLE
    // =========================
    AFRAME.registerComponent("interactable", {
      init: function () {
        this.isHovering = false;
        this.baseScale = null;
        this.baseEmissive = null;

        this.onHoverStart = () => {
          if (this.isHovering) return;
          if (!isEntityVisible(this.el)) return;
          this.isHovering = true;

          if (!this.baseScale) {
            const s = this.el.getAttribute("scale") || { x: 1, y: 1, z: 1 };
            this.baseScale = { x: s.x, y: s.y, z: s.z };
          }

          if (this.baseEmissive === null || this.baseEmissive === undefined) {
            const mat = this.el.getAttribute("material") || {};
            this.baseEmissive = typeof mat.emissiveIntensity === "number" ? mat.emissiveIntensity : 0;
          }

          this.el.setAttribute("scale", {
            x: this.baseScale.x * 1.08,
            y: this.baseScale.y * 1.08,
            z: this.baseScale.z * 1.08
          });
          this.el.setAttribute("material", "emissiveIntensity", this.baseEmissive + 0.35);
          playSfx("hover");
        };

        this.onHoverEnd = () => {
          if (!this.isHovering) return;
          this.isHovering = false;
          if (this.baseScale) this.el.setAttribute("scale", this.baseScale);
          if (this.baseEmissive !== null && this.baseEmissive !== undefined) {
            this.el.setAttribute("material", "emissiveIntensity", this.baseEmissive);
          }
        };

        this.el.addEventListener("mouseenter", this.onHoverStart);
        this.el.addEventListener("mouseleave", this.onHoverEnd);
        this.el.addEventListener("raycaster-intersected", this.onHoverStart);
        this.el.addEventListener("raycaster-intersected-cleared", this.onHoverEnd);

        this.el.addEventListener("click", (e) => {
          let current = this.el;
          let isVisible = true;
          while (current && current.tagName !== "A-SCENE") {
            const vis = current.getAttribute("visible");
            if (vis === false || vis === "false") {
              isVisible = false;
              break;
            }
            current = current.parentElement;
          }
          if (!isVisible) return;
          e.stopPropagation();

          const action = this.el.getAttribute("data-action");
          const param = this.el.getAttribute("data-param");
          if (action) {
            playSfx("click");
            handleClickAction(action, param);
          }
        });
      },
      remove: function () {
        this.el.removeEventListener("mouseenter", this.onHoverStart);
        this.el.removeEventListener("mouseleave", this.onHoverEnd);
        this.el.removeEventListener("raycaster-intersected", this.onHoverStart);
        this.el.removeEventListener("raycaster-intersected-cleared", this.onHoverEnd);
      }
    });

    // =========================
    // COMPONENTE SLOW ROTATION
    // =========================
    AFRAME.registerComponent("slow-rotate", {
      schema: {
        speed: { type: "number", default: 0.3 },
        axis: { type: "string", default: "y" }
      },
      tick: function (time, delta) {
        const rot = this.el.getAttribute("rotation") || { x: 0, y: 0, z: 0 };
        const deg = (delta / 1000) * this.data.speed * 360;
        if (this.data.axis === "y") rot.y += deg;
        else if (this.data.axis === "x") rot.x += deg;
        else rot.z += deg;
        this.el.setAttribute("rotation", rot);
      }
    });

    // =========================
    // COMPONENTE FLOAT-BOB
    // =========================
    AFRAME.registerComponent("float-bob", {
      schema: {
        amp: { type: "number", default: 0.12 },
        speed: { type: "number", default: 1.2 },
        offset: { type: "number", default: 0 }
      },
      init: function () {
        this.baseY = null;
      },
      tick: function (time) {
        if (this.baseY === null) {
          this.baseY = this.el.getAttribute("position").y;
        }
        const y = this.baseY + Math.sin((time / 1000) * this.data.speed + this.data.offset) * this.data.amp;
        const pos = this.el.getAttribute("position");
        this.el.setAttribute("position", { x: pos.x, y: y, z: pos.z });
      }
    });

    // =========================
    // TAMAÑO DINÁMICO DE BOTONES (MÁS GRANDES)
    // =========================
    function calcButtonSize(label, opts = {}) {
      const text = String(label || "");
      const lines = text.split("\n");
      const longest = Math.max(...lines.map(l => l.length), 1);

      const minW = opts.minW ?? 3.4;
      const maxW = opts.maxW ?? 8.5;
      const charW = opts.charW ?? 0.24;

      const width = Math.min(maxW, Math.max(minW, longest * charW + 1.3));
      const height = opts.height ?? (0.9 + lines.length * 0.55);
      const wrap = Math.max(10, Math.floor(width * 4.0));

      return { width, height, wrap, lines: lines.length };
    }
  </script>
</head>
<body>
  <!-- ============ MODAL DE LOGIN ============ -->
  <div id="login-modal" style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #000 0%, #0a0a1a 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10000;
  ">
    <div style="
      background: rgba(10, 20, 40, 0.95);
      border: 2px solid #00E5FF;
      border-radius: 12px;
      padding: 40px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 0 30px rgba(0, 229, 255, 0.3);
    ">
      <h1 style="
        color: #00E5FF;
        text-align: center;
        font-family: Arial, sans-serif;
        margin-bottom: 10px;
        font-size: 28px;
        letter-spacing: 2px;
      ">SISTEMA UNIVERSITARIO</h1>

      <p style="
        color: #00FF88;
        text-align: center;
        font-family: Arial, sans-serif;
        margin-bottom: 30px;
        font-size: 12px;
      ">Ingresa tus credenciales</p>

      <div style="margin-bottom: 20px;">
        <label style="color: #00E5FF; font-family: Arial; font-size: 13px; display: block; margin-bottom: 8px;">
          👤 Usuario
        </label>
        <input id="login-username" type="text" placeholder="admin" style="
          width: 100%;
          padding: 10px;
          background: rgba(0, 50, 100, 0.5);
          border: 1px solid #00E5FF;
          color: #00E5FF;
          border-radius: 6px;
          font-family: monospace;
          box-sizing: border-box;
        " />
      </div>

      <div style="margin-bottom: 30px;">
        <label style="color: #00E5FF; font-family: Arial; font-size: 13px; display: block; margin-bottom: 8px;">
          🔑 Contraseña
        </label>
        <input id="login-password" type="password" placeholder="••••••••" style="
          width: 100%;
          padding: 10px;
          background: rgba(0, 50, 100, 0.5);
          border: 1px solid #00E5FF;
          color: #00E5FF;
          border-radius: 6px;
          font-family: monospace;
          box-sizing: border-box;
        " />
      </div>

      <button id="login-btn" onclick="hacerLogin()" style="
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #00E5FF 0%, #00FF88 100%);
        border: none;
        color: #000;
        font-weight: bold;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        letter-spacing: 1px;
        transition: transform 0.2s, box-shadow 0.2s;
      ">▶ ENTRAR</button>

      <p id="login-error" style="
        color: #FF4444;
        text-align: center;
        font-family: Arial;
        font-size: 12px;
        margin-top: 15px;
        display: none;
      "></p>

      <p style="
        color: #888;
        text-align: center;
        font-family: Arial;
        font-size: 11px;
        margin-top: 20px;
      ">Prueba: admin / admin123</p>
    </div>
  </div>

  <!-- ============ INFO DEL USUARIO (esquina superior) ============ -->
  <div id="user-info-panel" style="
    position: fixed;
    top: 16px;
    right: 16px;
    background: rgba(0, 20, 30, 0.85);
    border: 1.5px solid #00FF88;
    border-radius: 8px;
    padding: 12px 18px;
    color: #00FF88;
    font-family: Arial, sans-serif;
    font-size: 13px;
    display: none;
    z-index: 9998;
    max-width: 250px;
  ">
    <div style="margin-bottom: 8px;">👤 <span id="user-display-name">Usuario</span></div>
    <div style="margin-bottom: 8px;">🔐 <span id="user-display-role">Rol</span></div>
    <button id="logout-btn" onclick="hacerLogout()" style="
      width: 100%;
      padding: 6px;
      background: #FF6B00;
      border: none;
      color: #FFF;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      margin-top: 8px;
    ">← SALIR</button>
  </div>

  <a-scene
    cursor="rayOrigin: mouse"
    raycaster="objects: .clickable; recursive: true; far: 60"
    background="color: #000"
    fog="type: linear; color: #000; far: 120; near: 0.1"
  >
    <!-- Luces -->
    <a-light type="ambient" intensity="0.5" color="#fff"></a-light>
    <a-light type="directional" intensity="1" color="#00E5FF" position="20 30 20"></a-light>
    <a-light type="directional" intensity="0.6" color="#FF00FF" position="-20 20 -20"></a-light>
    <a-light type="point" intensity="0.8" color="#00E5FF" position="7 10 5"></a-light>
    <a-light type="point" intensity="0.6" color="#FF00FF" position="7 5 -10"></a-light>

    <!-- Piso y entorno -->
    <a-plane id="teleport-surface" position="7 -3 -4" rotation="-90 0 0" width="240" height="240" color="#0a0a0a"></a-plane>
    <a-plane position="7 -2.97 -4" rotation="-90 0 0" width="240" height="240"
             material="shader: flat; color: #00E5FF; opacity: 0.03"></a-plane>
    <a-sky color="#050505"></a-sky>
    <a-entity id="stars"></a-entity>

    <!-- ESCENA 1: BIENVENIDA -->
    <a-entity id="escena-bienvenida" visible="true">
      <a-entity position="7 5 -15" animation="property: rotation; to: 0 360 0; dur: 20000; easing: linear; loop: true">
        <a-box color="#0a0a0a" depth="1" height="2.5" width="16" opacity="0.92"></a-box>
        <a-text value="SISTEMA DE GESTIÓN" align="center" position="0 0.8 0.6" width="21" color="#00E5FF"></a-text>
        <a-text value="UNIVERSITARIA" align="center" position="0 0.2 0.6" width="21" color="#00E5FF"></a-text>
      </a-entity>

      <a-entity position="7 3 -10">
        <a-sphere color="#00E5FF" radius="6" opacity="0.1" wireframe="true"
                  animation="property: rotation; to: 0 360 0; dur: 10000; easing: linear; loop: true"></a-sphere>

        <a-entity position="-5 0 0">
          <a-box class="clickable" interactable color="#00E5FF" depth="0.8" height="1.2" width="4.2" data-action="mostrarMenuTablas">
            <a-text value="VER TABLAS" align="center" position="0 0 0.5" width="6.2" color="#000"></a-text>
          </a-box>
        </a-entity>

        <a-entity position="0 0 0">
          <a-box class="clickable" interactable color="#FF00FF" depth="0.8" height="1.2" width="5.2" data-action="iniciarQueryBuilder">
            <a-text value="CONSTRUIR\nCONSULTA" align="center" position="0 0 0.5" width="6.5" color="#FFF"></a-text>
          </a-box>
        </a-entity>

        <a-entity position="5.3 0 0">
          <a-box class="clickable" interactable color="#00FF88" depth="0.8" height="1.2" width="6" data-action="iniciarConsultasGuiadas">
            <a-text value="CONSULTAS\nGUIADAS" align="center" position="0 0 0.5" width="7" color="#001A0E"></a-text>
          </a-box>
        </a-entity>
      </a-entity>
    </a-entity>

    <!-- ESCENA 2: MENÚ TABLAS -->
    <a-entity id="escena-menu-tablas" visible="false">
      <a-entity position="7 6 -15">
        <a-text value="SELECCIONA UNA TABLA" align="center" width="20" color="#00E5FF"></a-text>
      </a-entity>
      <a-entity id="menu-tablas" position="7 3 -4"></a-entity>

      <a-entity position="7 0 -4">
        <a-box class="clickable" interactable color="#FF6B00" depth="0.5" width="3.6" height="0.8" data-action="volver">
          <a-text value="← VOLVER" align="center" position="0 0 0.3" width="6" color="#FFF"></a-text>
        </a-box>
      </a-entity>
    </a-entity>

    <!-- ESCENA 5: QUERY BUILDER -->
    <a-entity id="escena-query-builder" visible="false" position="7 0 -10">
      <!-- Botones de control fijos ENCIMA del query display -->
      <a-entity id="query-control-buttons" position="0 8.5 -5"></a-entity>

      <a-entity position="0 6 -5">
        <a-box color="#111" depth="0.5" height="3.2" width="19" opacity="0.92"></a-box>
        
        <a-text id="query-display" value="Esperando instrucción..." position="-9 0 0.3" color="#00E5FF" width="16.8" wrap-count="40"></a-text>
      </a-entity>

      <a-entity position="0 3.8 -2">
        <a-text id="query-step-title" value="PASO 1 · OPERACIÓN SQL" align="center" color="#FFF" width="12"></a-text>
      </a-entity>

      <a-entity id="query-options-container" position="0 2.2 -2"></a-entity>
      <a-entity id="query-hint-container" position="0 0 -2"></a-entity>
    </a-entity>

    <!-- ESCENA 6: CONSULTAS GUIADAS -->
    <a-entity id="escena-consultas-guiadas" visible="false" position="7 0 -10">
      <a-entity position="0 7.2 -6">
        <a-box color="#050D0A" depth="0.25" height="1.6" width="14"
               material="color: #050D0A; emissive: #00FF88; emissiveIntensity: 0.06; opacity: 0.96"></a-box>
        <a-box color="#00FF88" depth="0.26" height="0.04" width="14" position="0 0.78 0"
               material="color: #00FF88; emissive: #00FF88; emissiveIntensity: 1; opacity: 0.9"></a-box>
        <a-box color="#00FF88" depth="0.26" height="0.04" width="14" position="0 -0.78 0"
               material="color: #00FF88; emissive: #00FF88; emissiveIntensity: 1; opacity: 0.9"></a-box>
        <a-text value="ANÁLISIS · CONSULTAS GUIADAS" align="center" position="0 0.28 0.14"
                width="13" color="#00FF88"></a-text>
        <a-text value="Selecciona un análisis para visualizar datos en 3D o 2D"
                align="center" position="0 -0.25 0.14" width="11" color="#4DFFBB"></a-text>
      </a-entity>

      <a-entity position="-7.5 6.8 -6">
        <a-box class="clickable" interactable depth="0.3" width="3.2" height="0.9"
               material="color: #1A0800; emissive: #FF6B00; emissiveIntensity: 0.35"
               data-action="volver">
          <a-text value="← VOLVER" align="center" position="0 0 0.16" width="6" color="#FF9944"></a-text>
        </a-box>
      </a-entity>

      <a-entity id="consultas-guiadas-container" position="0 4.6 -4"></a-entity>
    </a-entity>

    <!-- ESCENA 3: TABLA -->
    <a-entity id="escena-tabla" visible="false" position="7 0 -15">
      <a-entity position="0 6 0">
        <a-box color="#0a0a0a" depth="0.4" height="1" width="14" opacity="0.95"></a-box>
        <a-text id="texto-tabla" value="" align="center" position="0 0 0.25" width="18" color="#00E5FF"></a-text>
      </a-entity>

      <a-entity id="controles-lateral" position="-6.2 2.5 0">
        <a-box color="#111" depth="0.3" height="6.2" width="2" opacity="0.85"></a-box>
        <a-text value="CONTROLES" position="0 2.3 0.2" align="center" color="#00E5FF" width="4"></a-text>

            <a-text value="ANTERIOR" align="center" position="0 0 0.2" width="4.4" color="#00E5FF"></a-text>
          </a-box>
        </a-entity>

        <a-entity position="0 0.35 0.2">
          <a-text id="label-pagina" value="PÁG.\n1 / 1" align="center" color="#FFF" width="4.8"></a-text>
        </a-entity>

        <a-entity position="0 -0.6 0.15">
          <a-box id="btn-siguiente" class="clickable" interactable color="#222" width="1.8" height="0.7" depth="0.3" data-action="cambiarPagina" data-param="1">
            <a-text value="SIGUIENTE" align="center" position="0 0 0.2" width="4.4" color="#00E5FF"></a-text>
          </a-box>
        </a-entity>
      </a-entity>

      <!-- SWITCH 2D / 3D PARA TABLA -->

        <a-entity class="clickable" position="0 0 0">
          <a-box class="clickable" interactable width="1.8" height="0.62" depth="0.3"
                 material="color: #0A1020; emissive: #00E5FF; emissiveIntensity: 0.35; opacity: 0.98"
                 data-action="tabla_ver_3d">
            <a-text value="VER 3D" align="center" position="0 0 0.18" width="3.8" color="#00E5FF"></a-text>
          </a-box>
        </a-entity>

        <a-entity class="clickable" position="0 -0.84 0">
          <a-box class="clickable" interactable width="1.8" height="0.62" depth="0.3"
                 material="color: #201008; emissive: #FFB700; emissiveIntensity: 0.35; opacity: 0.98"
                 data-action="tabla_ver_2d">
            <a-text value="VER 2D" align="center" position="0 0 0.18" width="3.8" color="#FFB700"></a-text>
          </a-box>
        </a-entity>

      <a-entity id="area-datos" position="6 0 0">
        <a-entity id="tabla-cabecera" position="0 5 0"></a-entity>

      <a-entity position="0 6.8 0">

        <a-text id="titulo-analisis" value="ANÁLISIS" align="center" position="0 0 0.25" width="18" color="#9D4EDD"></a-text>

        <a-box class="clickable" interactable depth="0.35" width="3.4" height="0.9"

        <a-box color="#0A0F0A" depth="0.3" height="5.8" width="2.6"

        <a-box depth="0.31" height="5.8" width="0.04" position="-1.3 0 0"
               material="color: #9D4EDD; emissive: #9D4EDD; emissiveIntensity: 0.8; opacity: 0.7"></a-box>
        <a-text value="ESTADÍSTICAS" position="0 2.4 0.17" align="center" color="#9D4EDD" width="4.6"></a-text>
        <a-text id="stat-edad-min" value="MIN: --" position="0 1.5 0.17" align="center" color="#00FF88" width="4.6"></a-text>
        <a-text id="stat-edad-max" value="MÁX: --" position="0 0.7 0.17" align="center" color="#FF88FF" width="4.6"></a-text>
        <a-text id="stat-edad-prom" value="PROM: --" position="0 -0.1 0.17" align="center" color="#00E5FF" width="4.6"></a-text>
        <a-text id="stat-total" value="TOTAL: --" position="0 -0.9 0.17" align="center" color="#FFB700" width="4.6"></a-text>

      <a-entity id="grafico-wrapper" position="0 2.5 0">
        <a-entity id="grafico-edades" slow-rotate="speed: 0.18; axis: y"></a-entity>

    <!-- ============ TECLADO VIRTUAL VR ============ -->
    <a-entity id="vr-keyboard-panel" visible="false" position="7 4 -2">
      <!-- Panel de fondo -->
      <a-box width="14" height="6.8" depth="0.18"
             material="color: #050D18; emissive: #00E5FF; emissiveIntensity: 0.06; opacity: 0.97"></a-box>
      <!-- Borde superior -->
      <a-box width="14" height="0.06" depth="0.20" position="0 3.37 0"
             material="color: #00E5FF; emissive: #00E5FF; emissiveIntensity: 1; opacity: 0.85"></a-box>

      <!-- Título -->
      <a-text id="vrkb-title" value="INTRODUCE TEXTO" align="center"
              position="0 2.85 0.12" width="13" color="#00E5FF"></a-text>

      <!-- Display del texto introducido -->
      <a-box width="12.8" height="0.9" depth="0.14" position="0 2.2 0.05"
             material="color: #000D1A; emissive: #00E5FF; emissiveIntensity: 0.08; opacity: 0.98"></a-box>
      <a-text id="vrkb-display" value="" align="left"
              position="-6.0 2.2 0.14" width="13" color="#00FF88" wrap-count="36"></a-text>
      <!-- Cursor parpadeante -->
      <a-box id="vrkb-cursor" width="0.06" height="0.55" depth="0.12" position="0 2.2 0.14"
             material="color: #00FF88; emissive: #00FF88; emissiveIntensity: 1; opacity: 0.9"
             animation="property: material.opacity; from: 0.9; to: 0.1; dur: 600; loop: true; dir: alternate"></a-box>

      <!-- Filas de teclas (se generan por JS) -->
      <a-entity id="vrkb-keys" position="0 1.0 0.12"></a-entity>

      <!-- Botones de acción -->
      <a-entity id="vrkb-actions" position="0 -2.6 0.12"></a-entity>
    </a-entity>

    <!-- Rig -->
    <a-entity id="rig" position="7 3 8">
      <a-entity id="camera" camera look-controls wasd-controls></a-entity>
      <a-entity id="rightController" laser-controls="hand: right" raycaster="objects: .clickable; far: 60" line="color: #00E5FF; opacity: 0.7"></a-entity>
      <a-entity id="leftController"
                laser-controls="hand: left"
                raycaster="objects: .clickable; far: 60"
                line="color: #00E5FF; opacity: 0.7"
                teleport-controls="cameraRig: #rig; teleportOrigin: #camera; collisionEntities: #teleport-surface; startEvents: triggerdown; endEvents: triggerup; curveShootingSpeed: 8; hitCylinderColor: #00E5FF">
      </a-entity>
    </a-entity>
  </a-scene>

  <script>
    const API_URL = "http://192.168.1.136:3000";
    const tablas = ["estudiantes", "profesores", "asignaturas", "matriculas"];

    let queryState = {
      step: 1, operation: "", table: "", columns: [],
      whereCol: "", whereVal: "", whereOptions: [],
      orderCol: "", orderDir: "ASC",
      createTableName: "",
      createColumns: []
    };

    let datosActuales = [];
    let paginaActual = 0;
    const filasPorPagina = 6;
    let tablaActual = "";
    let ultimaEscenaDeAnalisis = "escena-consultas-guiadas";

    let tablaVista = "2d"; // "2d" | "3d"

    let analisisActual = {
      titulo: "",
      datos: {},
      tipoValor: "count",
      vista: "3d"
    };

    const schemasMock = {
      estudiantes: ["matricula", "nombre", "apellido", "telefono", "correoelectronico", "direccion", "edad"],
      profesores: ["idprofesor", "nombre", "apellido", "correoelectronico", "departamento", "salario"],
      asignaturas: ["idasignatura", "nombre", "creditos", "curso", "semestre", "idprofesor"],
      matriculas: ["matricula", "idasignatura", "fechamatriculacion", "notanumerica", "notatexto"]
    };

    const accionesEnProgreso = new Set();
    const colores = {
      celda:"#1a1a2e",
      celdaTexto:"#00E5FF",
      cabecera:"#0f3460",
      cabeceraTexto:"#00FF88",
      fila_alt:"#16213e"
    };

    const CONSULTAS_GUIADAS = [
      { id:"edad-distribucion", label:"Distribución\nde Edades", emoji:"◈", color:"#00E5FF", bg:"#001820" },
      { id:"edad-prom-curso", label:"Edad Promedio\nGlobal", emoji:"◉", color:"#00FF88", bg:"#00180E" },
      { id:"prof-departamento", label:"Profesores por\nDepartamento", emoji:"◆", color:"#FF00FF", bg:"#180018" },
      { id:"salario-departamento", label:"Salario Promedio\npor Depto.", emoji:"◈", color:"#FFB700", bg:"#181000" },
      { id:"asignaturas-curso", label:"Asignaturas\npor Curso", emoji:"◉", color:"#9D4EDD", bg:"#110018" },
      { id:"nota-asignatura", label:"Nota Promedio\npor Asignatura", emoji:"◆", color:"#FF6B6B", bg:"#180A0A" }
    ];

    class NavigationManager {
      constructor() {
        this.stack = ["escena-bienvenida"];
      }
      hideAll() {
        [
          "escena-bienvenida",
          "escena-menu-tablas",
          "escena-query-builder",
          "escena-consultas-guiadas",
          "escena-tabla",
          "escena-analisis-edades"
        ].forEach(id => document.getElementById(id).setAttribute("visible", "false"));
      }
      goTo(escena) {
        this.hideAll();
        document.getElementById(escena).setAttribute("visible", "true");
        if (this.stack[this.stack.length - 1] !== escena) this.stack.push(escena);
      }
      goBack() {
        if (this.stack.length > 1) this.stack.pop();
        const prev = this.stack[this.stack.length - 1];
        this.hideAll();
        document.getElementById(prev).setAttribute("visible", "true");
      }
    }
    const nav = new NavigationManager();

    function puedeEjecutarAccion(action) {
      if (accionesEnProgreso.has(action)) return false;
      accionesEnProgreso.add(action);
      setTimeout(() => accionesEnProgreso.delete(action), 250);
      return true;
    }

    function limpiarEntidad(id) {
      const el = document.getElementById(id);
      if (el) el.innerHTML = "";
      return el;
    }

    function normalizeText(v) {
      return String(v ?? "").trim();
    }

    function hslToHex(h, s, l) {
      s /= 100; l /= 100;
      const a = s * Math.min(l, 1 - l);
      const f = n => {
        const k = (n + h / 30) % 12;
        const c = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
        return Math.round(255 * c).toString(16).padStart(2, "0");
      };
      return `#${f(0)}${f(8)}${f(4)}`;
    }

    function crearBoton(label, action, param, bg="#111", color="#FF00FF", width) {
      const e = document.createElement("a-entity");
      const pAttr = param !== undefined ? `data-param="${String(param).replace(/"/g, "&quot;")}"` : "";
      const size = calcButtonSize(label, { maxW: width ?? 7.6 });

      e.innerHTML = `
        <a-box class="clickable" interactable width="${size.width}" height="${size.height}" depth="0.4"
               material="color: ${bg}; emissive: ${color}; emissiveIntensity: 0.24"
               data-action="${action}" ${pAttr}>
          <a-text value="${label}" align="center" position="0 0 0.22"
                  width="${size.width * 1.25}" wrap-count="${size.wrap}"
                  color="${color}"></a-text>
        </a-box>
      `;
      return e;
    }

    function layoutBotones(cont, opciones, opts = {}) {
      const maxWidth = opts.maxWidth || 18;
      const maxCols = opts.maxCols || 3;
      const gapX = opts.gapX || 1.8;
      const gapY = opts.gapY || 2.4;

      let rows = [];
      let current = [];
      let rowWidth = 0;

      opciones.forEach((op) => {
        const size = (op.w && op.h)
          ? { width: op.w, height: op.h, wrap: Math.max(10, Math.floor(op.w * 4.0)) }
          : calcButtonSize(op.label, { maxW: op.w || 7.6 });
        const w = size.width;

        const nextWidth = current.length === 0 ? w : rowWidth + gapX + w;
        const withinWidth = nextWidth <= maxWidth;
        const withinCols = current.length < maxCols;

        if (current.length === 0 || (withinWidth && withinCols)) {
          current.push({ ...op, _w: w, _h: op.h || size.height, _wrap: size.wrap });
          rowWidth = nextWidth;
        } else {
          rows.push(current);
          current = [{ ...op, _w: w, _h: op.h || size.height, _wrap: size.wrap }];
          rowWidth = w;
        }
      });
      if (current.length) rows.push(current);

      rows.forEach((row, rowIndex) => {
        const totalRowWidth = row.reduce((acc, b) => acc + b._w, 0) + gapX * (row.length - 1);
        let x = -totalRowWidth / 2;

        row.forEach((op) => {
          const ent = document.createElement("a-entity");
          ent.setAttribute("position", `${x + op._w / 2} ${-rowIndex * gapY} 0`);

          ent.innerHTML = `
            <a-box class="clickable" interactable
                   width="${op._w}" height="${op._h}" depth="0.35"
                   material="color: #0a1020; emissive: ${op.emissive || "#00E5FF"}; emissiveIntensity: ${op.emissive ? 0.22 : 0.12}"
                   data-action="${op.action}" ${op.param !== undefined ? `data-param="${String(op.param).replace(/"/g, "&quot;")}"` : ""}>
              <a-text value="${op.label}" align="center" position="0 0 0.19"
                      width="${op._w * 1.25}" wrap-count="${op.wrap || op._wrap}"
                      color="${op.textColor || "#00E5FF"}"></a-text>
            </a-box>
          `;
          cont.appendChild(ent);
          x += op._w + gapX;
        });
      });

      return { rows: rows.length };
    }

    function parseApiArray(raw) {
      if (Array.isArray(raw)) return raw;
      if (Array.isArray(raw?.data)) return raw.data;
      if (Array.isArray(raw?.items)) return raw.items;
      return [];
    }

    function generarEstrellas() {
      const starsContainer = document.querySelector("#stars");
      for (let i = 0; i < 150; i++) {
        const star = document.createElement("a-sphere");
        star.setAttribute("radius", Math.random() * 0.12);
        star.setAttribute("color", "#FFF");
        star.setAttribute("position", `${Math.random() * 220 - 110} ${Math.random() * 120} ${Math.random() * 220 - 110}`);
        star.setAttribute("opacity", Math.random() * 0.8 + 0.2);
        starsContainer.appendChild(star);
      }
    }
    generarEstrellas();

    const rig = document.querySelector("#rig");
    let rigPos = { x: 7, y: 3, z: 8 };
    let leftJoystick = { x: 0, y: 0 };
    let rightJoystick = { x: 0, y: 0 };

    const teclas = { subir: false, bajar: false };

    window.addEventListener("keydown", (e) => {
      if (e.code === "KeyE") teclas.subir = true;
      if (e.code === "KeyQ") teclas.bajar = true;
    });

    window.addEventListener("keyup", (e) => {
      if (e.code === "KeyE") teclas.subir = false;
      if (e.code === "KeyQ") teclas.bajar = false;
    });

    document.querySelector("#leftController")?.addEventListener("thumbstickmoved", (e) => { leftJoystick = e.detail; });
    document.querySelector("#rightController")?.addEventListener("thumbstickmoved", (e) => { rightJoystick = e.detail; });

    setInterval(() => {
      rigPos.x += (leftJoystick.x || 0) * 0.1;
      rigPos.z += (leftJoystick.y || 0) * 0.1;
      rigPos.y += (rightJoystick.y || 0) * 0.05;
      const stepY = 0.08;
      if (teclas.subir) rigPos.y += stepY;
      if (teclas.bajar) rigPos.y -= stepY;
      rig.setAttribute("position", `${rigPos.x} ${rigPos.y} ${rigPos.z}`);
    }, 30);

    const RESET_POS = { x: 7, y: 3, z: 8 };

    function resetVista() {
      rigPos.x = RESET_POS.x;
      rigPos.y = RESET_POS.y;
      rigPos.z = RESET_POS.z;
      rig.setAttribute("position", `${rigPos.x} ${rigPos.y} ${rigPos.z}`);

      const camEl = document.querySelector("#camera");
      if (camEl && camEl.components["look-controls"]) {
        const lc = camEl.components["look-controls"];
        if (lc.yawObject)   lc.yawObject.rotation.set(0, 0, 0);
        if (lc.pitchObject) lc.pitchObject.rotation.set(0, 0, 0);
        camEl.setAttribute("rotation", "0 0 0");
      }

      mostrarToastHUD("↺ VISTA RECENTRADA");
    }

    window.addEventListener("keydown", (e) => {
      if (e.code === "KeyR" && !e.repeat) resetVista();
    });

    ["rightController", "leftController"].forEach(id => {
      const ctrl = document.querySelector(`#${id}`);
      if (!ctrl) return;
      ["menudown", "startdown", "abuttondown"].forEach(evt => {
        ctrl.addEventListener(evt, () => resetVista());
      });
    });

    let _toastTimeout = null;
    function mostrarToastHUD(texto) {
      let toast = document.getElementById("hud-toast");
      if (!toast) {
        toast = document.createElement("div");
        toast.id = "hud-toast";
        Object.assign(toast.style, {
          position: "fixed",
          bottom: "32px",
          left: "50%",
          transform: "translateX(-50%)",
          background: "rgba(0,229,255,0.18)",
          border: "1.5px solid #00E5FF",
          color: "#00E5FF",
          fontFamily: "Arial, sans-serif",
          fontSize: "15px",
          letterSpacing: "2px",
          padding: "10px 28px",
          borderRadius: "6px",
          pointerEvents: "none",
          zIndex: "9999",
          transition: "opacity 0.3s",
          opacity: "0"
        });
        document.body.appendChild(toast);
      }
      toast.textContent = texto;
      toast.style.opacity = "1";
      clearTimeout(_toastTimeout);
      _toastTimeout = setTimeout(() => { toast.style.opacity = "0"; }, 1800);
    }

    function handleClickAction(action, param) {
      if (!puedeEjecutarAccion(action)) return;

      if (action === "volver") return nav.goBack();

      if (action === "mostrarMenuTablas") return mostrarMenuTablas();
      if (action === "cargarTabla") return cargarTabla(param);
      if (action === "cambiarPagina") return cambiarPagina(parseInt(param, 10));

      if (action === "tabla_ver_3d") return setVistaTabla("3d");
      if (action === "tabla_ver_2d") return setVistaTabla("2d");

      if (action === "iniciarQueryBuilder") return iniciarQueryBuilder();
      if (action === "qb_op") return qb_selOp(param);
      if (action === "qb_tabla") return qb_selTabla(param);
      if (action === "qb_col") return qb_selCol(param);
      if (action === "qb_skip") return qb_skip();
      if (action === "qb_where_col") return qb_selWhereCol(param);
      if (action === "qb_where_val") return qb_selWhereVal(param);
      if (action === "qb_order_col") return qb_selOrderCol(param);
      if (action === "qb_toggle_order_dir") return qb_toggleOrderDir();
      if (action === "qb_ejecutar") return qb_ejecutar();

      if (action === "qb_create_set_name") return qb_create_set_name();
      if (action === "qb_create_add_col") return qb_create_add_col(param);
      if (action === "qb_create_remove_col") return qb_create_remove_col();
      if (action === "qb_create_exec") return qb_create_exec();

      if (action === "iniciarConsultasGuiadas") return iniciarConsultasGuiadas();
      if (action === "ejecutarConsultaGuiada") return ejecutarConsultaGuiada(param);

      if (action === "analisis_ver_3d") return setVistaAnalisis("3d");
      if (action === "analisis_ver_2d") return setVistaAnalisis("2d");

      if (action === "resetVista") return resetVista();

      // Teclado VR
      if (action === "vrkb_key") {
        _vrkbText += param;
        _vrkbActualizar();
        return;
      }
      if (action === "vrkb_space") {
        _vrkbText += " ";
        _vrkbActualizar();
        return;
      }
      if (action === "vrkb_back") {
        _vrkbText = _vrkbText.slice(0, -1);
        _vrkbActualizar();
        return;
      }
      if (action === "vrkb_toggle_case") {
        if (_vrkbMode === "num") { _vrkbMode = "upper"; }
        else if (_vrkbMode === "upper") { _vrkbMode = "lower"; }
        else { _vrkbMode = "upper"; }
        _vrkbRenderKeys();
        return;
      }
      if (action === "vrkb_toggle_num") {
        _vrkbMode = _vrkbMode === "num" ? "upper" : "num";
        _vrkbRenderKeys();
        return;
      }
      if (action === "vrkb_confirm") {
        const cb = _vrkbCallback;
        const val = _vrkbText;
        cerrarTecladoVR();
        if (cb) cb(val);
        return;
      }
      if (action === "vrkb_cancel") {
        cerrarTecladoVR();
        return;
      }
    }

    function setVistaTabla(vista) {
      tablaVista = vista;
      renderizarTabla();
    }

    function mostrarMenuTablas() {
      nav.goTo("escena-menu-tablas");
      const menu = limpiarEntidad("menu-tablas");

      tablas.forEach((nombre, index) => {
        const angle = (index / tablas.length) * Math.PI * 2;
        const x = Math.cos(angle) * 8;
        const z = Math.sin(angle) * 8;

        const btn = document.createElement("a-entity");
        btn.setAttribute("position", `${x} 3 ${z}`);
        btn.setAttribute("float-bob", `amp: 0.08; speed: 0.9; offset: ${index * 0.9}`);
        btn.innerHTML = `
          <a-box class="clickable" interactable width="4.2" height="1.2" depth="0.5" color="#222"
                 data-action="cargarTabla" data-param="${nombre}">
            <a-text value="${nombre.toUpperCase()}" align="center" position="0 0 0.26" width="7" color="#00E5FF"></a-text>
          </a-box>
        `;
        menu.appendChild(btn);
      });

      menu.setAttribute("slow-rotate", "speed: 0.04; axis: y");
    }

    function iniciarQueryBuilder() {
      nav.goTo("escena-query-builder");
      queryState = {
        step: 1, operation: "", table: "", columns: [],
        whereCol: "", whereVal: "", whereOptions: [],
        orderCol: "", orderDir: "ASC",
        createTableName: "",
        createColumns: []
      };
      limpiarEntidad("query-hint-container");
      actualizarDisplaySQL();
      renderQBOpciones();
    }

    function actualizarDisplaySQL() {
      let sql = "";
      const s = queryState;

      if (s.operation === "SELECT") {
        const cols = s.columns.length ? s.columns.join(", ") : "*";
        sql = `SELECT ${cols}`;
        if (s.table) sql += `\nFROM ${s.table}`;
        if (s.whereCol && s.whereVal !== "") sql += `\nWHERE ${s.whereCol} = '${s.whereVal}'`;
        else if (s.whereCol && !s.whereVal) sql += `\nWHERE ${s.whereCol} = '...'`;
        if (s.orderCol) sql += `\nORDER BY ${s.orderCol} ${s.orderDir}`;
        sql += ";";
      } else if (s.operation === "CREATE_TABLE") {
        const cols = s.createColumns.length
          ? s.createColumns.map(c => `${c.name} ${c.type}`).join(", ")
          : "...";
        sql = `CREATE TABLE ${s.createTableName || "nombre_tabla"} (\n  ${cols}\n);`;
      } else if (s.operation) {
        sql = `${s.operation} ...`;
      }

      document.getElementById("query-display").setAttribute("value", sql || "-- Selecciona una operación");
    }

    function renderQBOpciones() {
      const cont = limpiarEntidad("query-options-container");
      const hint = limpiarEntidad("query-hint-container");
      const ctrlCont = limpiarEntidad("query-control-buttons");
      const titleEl = document.getElementById("query-step-title");

      let opciones = [];
      let extraButtons = [];

      if (queryState.step === 1) {
        titleEl.setAttribute("value", "PASO 1 · OPERACIÓN SQL");
        const ops = ["SELECT"];
        if (tienePermiso("admin_create_table")) ops.push("CREATE TABLE");

        opciones = ops.map((op, i) => ({
          label: op,
          action: "qb_op",
          param: op,
          emissive: ["#00E5FF", "#00FF88", "#FFB700", "#FF4444"][i],
          textColor: ["#00E5FF", "#00FF88", "#FFB700", "#FF4444"][i]
        }));
      }
      else if (queryState.step === 2 && queryState.operation === "SELECT") {
        titleEl.setAttribute("value", "PASO 2 · TABLA PRINCIPAL");
        opciones = tablas.map(t => ({ label: t.toUpperCase(), action: "qb_tabla", param: t }));
      }
      else if (queryState.step === 3 && queryState.operation === "SELECT") {
        titleEl.setAttribute("value", "PASO 3 · COLUMNAS (selección múltiple)");
        const cols = ["*", ...(schemasMock[queryState.table] || ["id", "nombre"])];
        opciones = cols.map(c => ({
          label: c.toUpperCase(),
          action: "qb_col",
          param: c,
          w: 5.5,
          h: 1.0,
          emissive: queryState.columns.includes(c) ? "#FFB700" : "#00E5FF",
          textColor: queryState.columns.includes(c) ? "#FFB700" : "#00E5FF"
        }));
        if (queryState.columns.length > 0) {
          extraButtons.push({ label: "PASO 4 →", action: "qb_skip", bg: "#1A1A2E", color: "#00E5FF", w: 5 });
        }
      }
      else if (queryState.step === 4 && queryState.operation === "SELECT") {
        titleEl.setAttribute("value", "PASO 4 · FILTRO WHERE (opcional)");
        const cols = schemasMock[queryState.table] || [];
        opciones = cols.map(c => ({ label: `WHERE ${c}`, action: "qb_where_col", param: c }));
        extraButtons.push({ label: "SALTAR WHERE", action: "qb_skip", bg: "#111", color: "#FF00FF", w: 5.8 });
      }
      else if (queryState.step === 4.5 && queryState.operation === "SELECT") {
        titleEl.setAttribute("value", `PASO 4.5 · VALOR DE ${queryState.whereCol?.toUpperCase() || "WHERE"}`);
        opciones = queryState.whereOptions.map((v, idx) => ({
          label: `= '${String(v).length > 14 ? String(v).slice(0, 11) + "..." : String(v)}'`,

    function qb_selOp(op) {
      if (op === "CREATE TABLE") {
        queryState.operation = "CREATE_TABLE";
        queryState.step = 2;
        queryState.createTableName = "";
        queryState.createColumns = [];
      } else {
        queryState.operation = op;
        queryState.step = op === "SELECT" ? 2 : 6;
      }
      actualizarDisplaySQL();
      renderQBOpciones();
    }

    async function qb_selTabla(tabla) {
      queryState.table = tabla;
      document.getElementById("query-step-title").setAttribute("value", "CARGANDO COLUMNAS...");
      limpiarEntidad("query-options-container");

      try {
        const res = await fetch(`${API_URL}/${tabla}?limit=1`);
        const raw = await res.json();
        const arr = parseApiArray(raw);
        if (arr.length) schemasMock[tabla] = Object.keys(arr[0]);
      } catch (e) {
        console.warn("No se pudieron cargar columnas en vivo. Se usa schema local.");
      }

      queryState.step = queryState.operation === "SELECT" ? 3 : 6;
      actualizarDisplaySQL();
      renderQBOpciones();
    }

    function qb_selCol(col) {
      if (col === "*") {
        queryState.columns = ["*"];
      } else {
        queryState.columns = queryState.columns.filter(c => c !== "*");
        if (queryState.columns.includes(col)) queryState.columns = queryState.columns.filter(c => c !== col);
        else queryState.columns.push(col);
      }
      actualizarDisplaySQL();
      renderQBOpciones();
    }

    async function qb_selWhereCol(col) {
      queryState.whereCol = col;
      queryState.whereVal = "";
      document.getElementById("query-step-title").setAttribute("value", "CARGANDO VALORES...");
      limpiarEntidad("query-options-container");

      try {
        const url = `${API_URL}/${queryState.table}?select=${encodeURIComponent(col)}&${encodeURIComponent(col)}=not.is.null&limit=1000`;
        const res = await fetch(url);
        const raw = await res.json();
        const arr = parseApiArray(raw);

        const vals = [...new Set(
          arr.map(r => normalizeText(r[col])).filter(v => v !== "")
        )];

        queryState.whereOptions = vals.slice(0, 20);
      } catch {
        queryState.whereOptions = [];
      }

      if (!queryState.whereOptions.length) queryState.whereOptions = ["Sin datos"];
      queryState.step = 4.5;
      actualizarDisplaySQL();
      renderQBOpciones();
    }

    function qb_selWhereVal(idxStr) {
      const idx = parseInt(idxStr, 10);
      queryState.whereVal = queryState.whereOptions[idx] ?? "";
      queryState.step = 5;
      actualizarDisplaySQL();
      renderQBOpciones();
    }

      queryState.orderCol = col;
      queryState.step = 6;
      actualizarDisplaySQL();
      renderQBOpciones();
    }

      queryState.orderDir = queryState.orderDir === "ASC" ? "DESC" : "ASC";

      renderQBOpciones();

    function qb_skip() {
      if (queryState.operation === "CREATE_TABLE") {
        queryState.step = Math.min(queryState.step + 1, 4);
      } else {
        if (queryState.step === 4.5) {
          queryState.whereCol = "";
          queryState.whereVal = "";
          queryState.step = 5;
        } else {
          queryState.step = Math.min(queryState.step + 1, 6);
        }
      }
      actualizarDisplaySQL();
      renderQBOpciones();
    }

      nav.goTo("escena-tabla");

      tablaVista = "2d";

      const titulo = `${queryState.operation} ${queryState.table.toUpperCase()}`;

      try {
        const params = new URLSearchParams();

        if (queryState.columns.length && queryState.columns[0] !== "*") {
          params.set("select", queryState.columns.join(","));
        }

        if (queryState.whereCol && queryState.whereVal !== "" && queryState.whereVal !== undefined) {
          params.set(queryState.whereCol, `eq.${queryState.whereVal}`);

        if (queryState.orderCol) {
          params.set("order", `${queryState.orderCol}.${queryState.orderDir.toLowerCase()}`);

        params.set("limit", "1000");

    function abrirTecladoVR(titulo, valorInicial, callback) {
      _vrkbCallback = callback;
      _vrkbText = valorInicial || "";
      _vrkbMode = "upper";
      const panel = document.getElementById("vr-keyboard-panel");
      panel.setAttribute("visible", "true");
      // Posicionar frente a la cámara
      const cam = document.querySelector("#camera");
      const rig = document.querySelector("#rig");
      if (cam && rig) {
        const rigPos = rig.getAttribute("position");
        const camRot = cam.getAttribute("rotation") || { x: 0, y: 0, z: 0 };
        const yRad = (camRot.y || 0) * Math.PI / 180;
        panel.setAttribute("position", {
          x: (rigPos.x || 7) - Math.sin(yRad) * 6,
          y: (rigPos.y || 3) + 1,
          z: (rigPos.z || 8) - Math.cos(yRad) * 6
        });
        panel.setAttribute("rotation", { x: 0, y: -(camRot.y || 0), z: 0 });
      }
      document.getElementById("vrkb-title").setAttribute("value", titulo.toUpperCase());
      _vrkbActualizar();
      _vrkbRenderKeys();
    }

    function cerrarTecladoVR() {
      document.getElementById("vr-keyboard-panel").setAttribute("visible", "false");
      _vrkbCallback = null;
    }

    function _vrkbActualizar() {
      const display = _vrkbText || "";
      document.getElementById("vrkb-display").setAttribute("value", display || " ");
      // Mover cursor al final del texto
      const cursorEl = document.getElementById("vrkb-cursor");
      const approxCharW = 0.36;
      const startX = -6.0;
      const cursorX = startX + display.length * approxCharW + 0.18;
      cursorEl.setAttribute("position", `${Math.min(cursorX, 5.8)} 2.2 0.14`);
    }

    function _vrkbRenderKeys() {
      const cont = document.getElementById("vrkb-keys");

      const rows = _vrkbMode === "num" ? _vrkbNumRows

                  : _vrkbLowerRows;

      const keyW = 1.15, keyH = 0.72, gapX = 0.10, gapY = 0.10;
      const rowsTotal = rows.length;

      rows.forEach((row, rowIdx) => {
        const totalW = row.length * keyW + (row.length - 1) * gapX;
        const startX = -totalW / 2 + keyW / 2;
        const y = -(rowIdx * (keyH + gapY));

        row.forEach((char, colIdx) => {

                   width="${keyW}" height="${keyH}" depth="0.22"

                      width="${keyW * 2.2}" color="#00E5FF"></a-text>

          cont.appendChild(ent);

      });

      // Fila especial: SHIFT/MAYUS | ESPACIO | BORRAR | NÚMEROS
      const bottomY = -(rowsTotal * (keyH + gapY)) - 0.15;
      const specialKeys = [
        { label: _vrkbMode === "num" ? "ABC" : (_vrkbMode === "upper" ? "minús" : "MAYÚS"), param: "vrkb_toggle_case", w: 2.2, color: "#FF00FF" },
        { label: "ESPACIO", param: "vrkb_space", w: 4.2, color: "#00FF88" },

      ];
      const totalSpecialW = specialKeys.reduce((a, k) => a + k.w, 0) + (specialKeys.length - 1) * 0.15;
      let sx = -totalSpecialW / 2;
      specialKeys.forEach(k => {
        const ent = document.createElement("a-entity");
        ent.setAttribute("position", `${sx + k.w / 2} ${bottomY} 0`);
        ent.innerHTML = `
          <a-box class="clickable" interactable
                 width="${k.w}" height="${keyH}" depth="0.22"
                 material="color: #0D0020; emissive: ${k.color}; emissiveIntensity: 0.28; opacity: 0.98"

            <a-text value="${k.label}" align="center" position="0 0 0.13"
                    width="${k.w * 2.0}" color="${k.color}"></a-text>

        cont.appendChild(ent);
        sx += k.w + 0.15;

      // Botones CONFIRMAR / CANCELAR
      const actCont = document.getElementById("vrkb-actions");
      actCont.innerHTML = `
        <a-entity position="-2.2 0 0">
          <a-box class="clickable" interactable width="4.0" height="0.78" depth="0.22"
                 material="color: #001800; emissive: #00FF88; emissiveIntensity: 0.45; opacity: 0.98"
                 data-action="vrkb_confirm">
            <a-text value="✓ CONFIRMAR" align="center" position="0 0 0.13" width="7.5" color="#00FF88"></a-text>
          </a-box>
        </a-entity>
        <a-entity position="2.6 0 0">
          <a-box class="clickable" interactable width="4.0" height="0.78" depth="0.22"
                 material="color: #1A0000; emissive: #FF4444; emissiveIntensity: 0.40; opacity: 0.98"

    async function fetchAll(endpoint, select = "*") {
      try {
        const url = `${API_URL}/${endpoint}?select=${encodeURIComponent(select)}&limit=2000`;
        const res = await fetch(url);
        const raw = await res.json();
        if (!res.ok) throw new Error(JSON.stringify(raw));
        return parseApiArray(raw);
      } catch (e) {
        console.error(`Error fetchAll(${endpoint}):`, e);
        return [];
      }
    }

    function toNum(v) {
      const n = Number(v);
      return Number.isFinite(n) ? n : NaN;
    }

    function groupCount(rows, key) {
      const out = {};
      rows.forEach(r => {
        const k = normalizeText(r[key]) || "N/D";
        out[k] = (out[k] || 0) + 1;
      });
      return out;
    }

    function groupAvg(rows, keyGroup, keyValue) {
      const acc = {};
      rows.forEach(r => {
        const g = normalizeText(r[keyGroup]) || "N/D";
        const n = toNum(r[keyValue]);
        if (!Number.isFinite(n)) return;
        if (!acc[g]) acc[g] = { sum: 0, count: 0 };
        acc[g].sum += n;
        acc[g].count += 1;
      });
      const out = {};
      Object.keys(acc).forEach(g => {
        out[g] = Number((acc[g].sum / acc[g].count).toFixed(2));
      });
      return out;
    }

    function statsFromValues(values) {
      const nums = values.map(toNum).filter(n => Number.isFinite(n));
      if (!nums.length) return { min: "--", max: "--", avg: "--", total: 0 };
      const min = Math.min(...nums);
      const max = Math.max(...nums);
      const avg = (nums.reduce((a, b) => a + b, 0) / nums.length).toFixed(2);
      return { min, max, avg, total: nums.length };
    }

    async function ejecutarConsultaGuiada(tipo) {
      ultimaEscenaDeAnalisis = "escena-consultas-guiadas";

      if (tipo === "edad-distribucion") {
        titulo = "DISTRIBUCIÓN DE EDADES";
        const rows = await fetchAll("estudiantes", "edad");
        datosGrafico = groupCount(rows, "edad");
        const s = statsFromValues(rows.map(r => r.edad));
        stats = { ...s, total: rows.length };
        tipoValor = "count";
      }
      else if (tipo === "edad-prom-curso") {
        titulo = "EDAD (MIN / MAX / PROM)";
        const rows = await fetchAll("estudiantes", "edad");
        const s = statsFromValues(rows.map(r => r.edad));
        datosGrafico = {
          "MIN": Number.isFinite(Number(s.min)) ? Number(s.min) : 0,
          "PROM": Number.isFinite(Number(s.avg)) ? Number(s.avg) : 0,
          "MAX": Number.isFinite(Number(s.max)) ? Number(s.max) : 0
        };
        stats = { ...s, total: rows.length };
        tipoValor = "num";
      }
      else if (tipo === "prof-departamento") {
        titulo = "PROFESORES POR DEPARTAMENTO";
        const rows = await fetchAll("profesores", "departamento");
        datosGrafico = groupCount(rows, "departamento");
        const counts = Object.values(datosGrafico);
        const s = statsFromValues(counts);
        stats = { ...s, total: rows.length };
        tipoValor = "count";

        const rows = await fetchAll("profesores", "departamento,salario");
        datosGrafico = groupAvg(rows, "departamento", "salario");
        const vals = Object.values(datosGrafico);
        const s = statsFromValues(vals);
        stats = { ...s, total: rows.length };
        tipoValor = "num";
      }
      else if (tipo === "asignaturas-curso") {

        const rows = await fetchAll("asignaturas", "curso");
        datosGrafico = groupCount(rows, "curso");
        const vals = Object.values(datosGrafico);
        const s = statsFromValues(vals);
        stats = { ...s, total: rows.length };
        tipoValor = "count";
      }
      else if (tipo === "nota-asignatura") {

        const vals = Object.values(datosGrafico);
        const s = statsFromValues(vals);
        stats = { ...s, total: rows.length };
        tipoValor = "num";
      }

      if (!Object.keys(datosGrafico).length) {
        datosGrafico = { "SIN DATOS": 0 };
      }

      document.getElementById("titulo-analisis").setAttribute("value", titulo);
      document.getElementById("stat-edad-min").setAttribute("value", `MIN: ${stats.min}`);
      document.getElementById("stat-edad-max").setAttribute("value", `MÁX: ${stats.max}`);
      document.getElementById("stat-edad-prom").setAttribute("value", `PROM: ${stats.avg}`);
      document.getElementById("stat-total").setAttribute("value", `TOTAL: ${stats.total}`);

      analisisActual.titulo = titulo;
      analisisActual.datos = datosGrafico;
      analisisActual.tipoValor = tipoValor;

      setVistaAnalisis(analisisActual.vista || "3d");
    }

    function setVistaAnalisis(vista) {
      analisisActual.vista = vista;
      const graf = document.getElementById("grafico-edades");
      if (!graf) return;

      if (vista === "2d") {
        graf.removeAttribute("slow-rotate");
        graf.setAttribute("rotation", "0 0 0");
        renderGrafico2D("grafico-edades", analisisActual.datos, analisisActual.tipoValor);
      } else {
        graf.setAttribute("rotation", "0 0 0");
        graf.setAttribute("slow-rotate", "speed: 0.18; axis: y");
        renderGrafico3D("grafico-edades", analisisActual.datos, analisisActual.tipoValor);
      }
    }

    async function cargarTabla(nombre) {
      nav.goTo("escena-tabla");
      tablaActual = nombre;
      paginaActual = 0;
      tablaVista = "2d";
      document.getElementById("texto-tabla").setAttribute("value", `SELECT ${nombre.toUpperCase()}`);

      try {
        const res = await fetch(`${API_URL}/${nombre}?limit=1000`);
        const raw = await res.json();
        if (!res.ok) throw new Error(JSON.stringify(raw));
        datosActuales = parseApiArray(raw);
      } catch (e) {
        console.error(e);
        datosActuales = [];
      }

      renderizarTabla();
    }

    function renderizarTabla() {
      if (tablaVista === "3d") return renderizarTabla3D();
      return renderizarTabla2D();
    }

    function renderizarTabla2D() {
      const cuerpo = limpiarEntidad("tabla-cuerpo");
      const cabecera = limpiarEntidad("tabla-cabecera");

      let columnas = [];
      if (datosActuales.length) columnas = Object.keys(datosActuales[0]);
      else if (queryState.columns.length && queryState.columns[0] !== "*") columnas = queryState.columns;
      else columnas = schemasMock[tablaActual] || [];

      if (!columnas.length) return;

      const espaciadoX = 3.2;
      const totalW = (columnas.length - 1) * espaciadoX;

      const cabeceraBG = document.createElement("a-entity");
      cabeceraBG.setAttribute("position", "0 0 -0.3");

      columnas.forEach((col, i) => {
        const x = i * espaciadoX - totalW / 2;

        const box = document.createElement("a-box");
        box.setAttribute("width", "3");
        box.setAttribute("height", "0.85");
        box.setAttribute("depth", "0.4");
        box.setAttribute("position", `${x} 0 0`);
        box.setAttribute("color", colores.cabecera);
        box.setAttribute("opacity", "0.9");

        const txt = document.createElement("a-text");
        txt.setAttribute("value", col.toUpperCase());
        txt.setAttribute("position", `${x} 0 0.25`);
        txt.setAttribute("color", colores.cabeceraTexto);
        txt.setAttribute("width", "6.6");
        txt.setAttribute("align", "center");

        cabeceraBG.appendChild(box);
        cabecera.appendChild(txt);
      });
      cabecera.appendChild(cabeceraBG);

      if (!datosActuales.length) {
        const msg = document.createElement("a-text");
        msg.setAttribute("value", "0 RESULTADOS");
        msg.setAttribute("position", `0 -1.5 0.25`);
        msg.setAttribute("color", "#FF4444");
        msg.setAttribute("width", "10");
        msg.setAttribute("align", "center");
        cuerpo.appendChild(msg);
        document.getElementById("label-pagina").setAttribute("value", "PÁG.\n0 / 0");
        return;
      }

      const totalPages = Math.max(1, Math.ceil(datosActuales.length / filasPorPagina));
      if (paginaActual >= totalPages) paginaActual = totalPages - 1;

      const slice = datosActuales.slice(paginaActual * filasPorPagina, (paginaActual + 1) * filasPorPagina);

      slice.forEach((fila, rowI) => {
        const filaEnt = document.createElement("a-entity");
        filaEnt.setAttribute("position", `0 ${-rowI * 1.08} 0`);

        columnas.forEach((col, colI) => {
          const x = colI * espaciadoX - totalW / 2;

          const box = document.createElement("a-box");
          box.setAttribute("width", "3");
          box.setAttribute("height", "0.9");
          box.setAttribute("depth", "0.4");
          box.setAttribute("position", `${x} 0 0`);
          box.setAttribute("color", rowI % 2 === 0 ? colores.celda : colores.fila_alt);
          box.setAttribute("opacity", "0.86");

          const txt = document.createElement("a-text");
          let val = fila[col] ?? "-";
          val = String(val);
          if (val.length > 20) val = val.slice(0, 17) + "...";
          txt.setAttribute("value", val);
          txt.setAttribute("position", `${x} 0 0.25`);
          txt.setAttribute("width", "5.6");
          txt.setAttribute("color", colores.celdaTexto);
          txt.setAttribute("align", "center");

          filaEnt.appendChild(box);
          filaEnt.appendChild(txt);
        });

        cuerpo.appendChild(filaEnt);
      });

      document.getElementById("label-pagina").setAttribute("value", `PÁG.\n${paginaActual + 1} / ${totalPages}`);
    }

    function renderizarTabla3D() {
      const cuerpo = limpiarEntidad("tabla-cuerpo");
      const cabecera = limpiarEntidad("tabla-cabecera");

      let columnas = [];
      if (datosActuales.length) columnas = Object.keys(datosActuales[0]);
      else if (queryState.columns.length && queryState.columns[0] !== "*") columnas = queryState.columns;
      else columnas = schemasMock[tablaActual] || [];

      if (!columnas.length) return;

      const espX = 2.6;
      const totalW = (columnas.length - 1) * espX;

      columnas.forEach((col, i) => {
        const x = i * espX - totalW / 2;
        const h = document.createElement("a-entity");
        h.setAttribute("position", `${x} 0 0`);
        h.innerHTML = `
          <a-box width="2.3" height="0.72" depth="0.52"
                 material="color:#091428; emissive:#00E5FF; emissiveIntensity:0.26; opacity:0.96"></a-box>
          <a-box width="2.33" height="0.05" depth="0.55" position="0 0.36 0"
                 material="color:#00E5FF; emissive:#00E5FF; emissiveIntensity:0.8; opacity:0.7"></a-box>
          <a-text value="${col.toUpperCase()}" align="center" position="0 0 0.30"
                  width="5.2" color="#00FF88"></a-text>
        `;
        cabecera.appendChild(h);
      });

      if (!datosActuales.length) {
        const msg = document.createElement("a-text");
        msg.setAttribute("value", "0 RESULTADOS");
        msg.setAttribute("position", "0 -1.3 0.35");
        msg.setAttribute("color", "#FF4444");
        msg.setAttribute("width", "8");
        msg.setAttribute("align", "center");
        cuerpo.appendChild(msg);
        document.getElementById("label-pagina").setAttribute("value", "PÁG.\n0 / 0");
        return;
      }

      const totalPages = Math.max(1, Math.ceil(datosActuales.length / filasPorPagina));
      if (paginaActual >= totalPages) paginaActual = totalPages - 1;
      const slice = datosActuales.slice(paginaActual * filasPorPagina, (paginaActual + 1) * filasPorPagina);

      slice.forEach((fila, rowI) => {
        const row = document.createElement("a-entity");
        row.setAttribute("position", `0 ${-rowI * 1.07} 0`);
        row.setAttribute("float-bob", `amp: 0.03; speed: ${0.8 + rowI * 0.08}; offset: ${rowI * 0.9}`);

        columnas.forEach((col, colI) => {
          const x = colI * espX - totalW / 2;
          let val = String(fila[col] ?? "-");
          if (val.length > 14) val = val.slice(0, 12) + "...";

          const colorBase = rowI % 2 === 0 ? "#121a2e" : "#1a2542";

          const cell = document.createElement("a-entity");
          cell.setAttribute("position", `${x} 0 0`);
          cell.innerHTML = `
            <a-box width="2.3" height="0.8" depth="0.48"
                   material="color:${colorBase}; emissive:#00E5FF; emissiveIntensity:0.08; opacity:0.94"></a-box>
            <a-box width="2.3" height="0.03" depth="0.50" position="0 -0.4 0"
                   material="color:#00E5FF; emissive:#00E5FF; emissiveIntensity:0.5; opacity:0.18"></a-box>
            <a-text value="${val}" align="center" position="0 0 0.27"
                    width="4.6" color="#CFFBFF"></a-text>
          `;
          row.appendChild(cell);
        });

        cuerpo.appendChild(row);
      });

      document.getElementById("label-pagina").setAttribute("value", `PÁG.\n${paginaActual + 1} / ${totalPages}`);
    }

    function cambiarPagina(delta) {
      const totalPages = Math.ceil(datosActuales.length / filasPorPagina);
      if (!totalPages) return;
      const next = paginaActual + delta;
      if (next >= 0 && next < totalPages) {
        paginaActual = next;
        renderizarTabla();
      }
    }

    function renderGrafico3D(containerId, datos, tipo = "count") {
      const cont = document.getElementById(containerId);
      if (!cont) return;
      cont.innerHTML = "";

      const claves = Object.keys(datos);
      const valores = Object.values(datos).map(v => Number(v) || 0);

      if (!claves.length) return;

      const maxVal = Math.max(...valores, 1);
      const altMax = 4.8;
      const radius = Math.max(3.2, claves.length * 0.52);

      claves.forEach((clave, i) => {
        const val = Number(datos[clave]) || 0;
        const altBarra = Math.max(0.08, (val / maxVal) * altMax);

        const angle = (i / claves.length) * Math.PI * 2;
        const x = Math.cos(angle) * radius;
        const z = Math.sin(angle) * radius;
        const y = altBarra / 2 - 2;

        const hue = Math.round((i / claves.length) * 360);
        const colorHex = hslToHex(hue, 88, 58);

        const bobSpeed = 0.6 + (i % 3) * 0.25;
        const bobAmp = 0.06 + (i % 2) * 0.04;
        const bobOffset = i * 0.8;

        const ent = document.createElement("a-entity");
        ent.setAttribute("position", `${x} ${y} ${z}`);
        ent.setAttribute("float-bob", `amp: ${bobAmp}; speed: ${bobSpeed}; offset: ${bobOffset}`);

        ent.innerHTML = `
          <a-box width="0.78" height="${altBarra}" depth="0.78"
                 material="color: ${colorHex}; emissive: ${colorHex}; emissiveIntensity: 0.30; opacity: 0.90"></a-box>

          <a-box width="0.86" height="0.07" depth="0.86"
                 position="0 ${altBarra / 2} 0"
                 material="color: #ffffff; emissive: ${colorHex}; emissiveIntensity: 0.9; opacity: 0.95"></a-box>

          <a-cylinder radius="0.55" height="0.04"
                      position="0 ${-altBarra / 2} 0"
                      material="color: ${colorHex}; emissive: ${colorHex}; emissiveIntensity: 0.7; opacity: 0.4"></a-cylinder>

          <a-text value="${String(clave).length > 10 ? String(clave).slice(0, 9) + '…' : clave}"
                  position="0 ${-altBarra / 2 - 0.62} 0"
                  color="#00E5FF" align="center" width="4.2"></a-text>

          <a-text value="${tipo === 'num' ? Number(val).toFixed(2) : val}"
                  position="0 ${altBarra / 2 + 0.52} 0"
                  color="#FFB700" align="center" width="4.2"></a-text>
        `;

        cont.appendChild(ent);
      });

      const base = document.createElement("a-cylinder");
      base.setAttribute("radius", radius + 0.8);
      base.setAttribute("height", "0.04");
      base.setAttribute("position", "0 -2 0");
      base.setAttribute("material", "color: #00E5FF; opacity: 0.05; wireframe: true");
      cont.appendChild(base);

      const ring = document.createElement("a-torus");
      ring.setAttribute("radius", radius + 0.8);
      ring.setAttribute("radius-tubular", "0.03");
      ring.setAttribute("position", "0 -2 0");
      ring.setAttribute("material", `color: #00E5FF; emissive: #00E5FF; emissiveIntensity: 0.5; opacity: 0.3`);
      cont.appendChild(ring);
    }

    function renderGrafico2D(containerId, datos, tipo = "count") {
      const cont = document.getElementById(containerId);
      if (!cont) return;
      cont.innerHTML = "";

      const claves = Object.keys(datos);
      const valores = Object.values(datos).map(v => Number(v) || 0);
      if (!claves.length) return;

      const maxVal = Math.max(...valores, 1);
      const chartWidth = 12;
      const chartHeight = 4.8;
      const gap = 0.35;
      const barW = Math.max(0.35, (chartWidth - gap * (claves.length - 1)) / claves.length);

      const panel = document.createElement("a-plane");
      panel.setAttribute("width", String(chartWidth + 1.2));
      panel.setAttribute("height", "6.2");
      panel.setAttribute("position", "0 0.6 -0.02");
      panel.setAttribute("material", "color: #070B12; opacity: 0.65; side: double");
      cont.appendChild(panel);

      const ejeX = document.createElement("a-box");
      ejeX.setAttribute("width", String(chartWidth + 0.2));
      ejeX.setAttribute("height", "0.03");
      ejeX.setAttribute("depth", "0.03");
      ejeX.setAttribute("position", "0 -2 0");
      ejeX.setAttribute("color", "#00E5FF");
      cont.appendChild(ejeX);

      const ejeY = document.createElement("a-box");
      ejeY.setAttribute("width", "0.03");
      ejeY.setAttribute("height", String(chartHeight + 0.2));
      ejeY.setAttribute("depth", "0.03");
      ejeY.setAttribute("position", `${-(chartWidth/2)} ${-2 + chartHeight/2} 0`);
      ejeY.setAttribute("color", "#00E5FF");
      cont.appendChild(ejeY);

      claves.forEach((k, i) => {
        const v = Number(datos[k]) || 0;
        const h = Math.max(0.05, (v / maxVal) * chartHeight);

        const x = -(chartWidth / 2) + (barW / 2) + i * (barW + gap);
        const y = -2 + h / 2;

        const hue = Math.round((i / claves.length) * 360);
        const colorHex = hslToHex(hue, 88, 58);

        const bar = document.createElement("a-box");
        bar.setAttribute("width", String(barW));
        bar.setAttribute("height", String(h));
        bar.setAttribute("depth", "0.08");
        bar.setAttribute("position", `${x} ${y} 0.02`);
        bar.setAttribute("material", `color: ${colorHex}; emissive: ${colorHex}; emissiveIntensity: 0.2; opacity: 0.95`);
        cont.appendChild(bar);

        const label = document.createElement("a-text");
        label.setAttribute("value", String(k).length > 8 ? String(k).slice(0, 8) + "…" : k);
        label.setAttribute("position", `${x} -2.35 0.03`);
        label.setAttribute("align", "center");
        label.setAttribute("width", "3.2");
        label.setAttribute("color", "#00E5FF");
        cont.appendChild(label);

        const valLabel = document.createElement("a-text");
        valLabel.setAttribute("value", tipo === "num" ? Number(v).toFixed(2) : String(v));
        valLabel.setAttribute("position", `${x} ${y + h/2 + 0.28} 0.03`);
        valLabel.setAttribute("align", "center");
        valLabel.setAttribute("width", "3.2");
        valLabel.setAttribute("color", "#FFB700");
        cont.appendChild(valLabel);
      });
    }

    // ============ AUTENTICACIÓN Y PERMISOS ============

    let usuarioActual = null;
    let permisosActuales = [];

    async function hacerLogin() {
      const username = document.getElementById("login-username").value.trim();
      const password = document.getElementById("login-password").value;
      const errorDiv = document.getElementById("login-error");
      const loginBtn = document.getElementById("login-btn");

      if (!username || !password) {
        errorDiv.textContent = "❌ Usuario y contraseña requeridos";
        errorDiv.style.display = "block";
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = "Conectando...";

      try {
        const response = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (!response.ok) {
          errorDiv.textContent = `❌ ${data.error || "Credenciales inválidas"}`;
          errorDiv.style.display = "block";
          loginBtn.disabled = false;
          loginBtn.textContent = "▶ ENTRAR";
          return;
        }

        usuarioActual = data;
        await cargarPermisos();
        mostrarApp();
        mostrarToastHUD(`✅ Bienvenido, ${data.username}!`);

      } catch (error) {
        console.error("Error en login:", error);
        errorDiv.textContent = "❌ Error de conexión";
        errorDiv.style.display = "block";
        loginBtn.disabled = false;
        loginBtn.textContent = "▶ ENTRAR";
      }
    }

    async function cargarPermisos() {
      try {
        const response = await fetch("/permissions");
        const data = await response.json();
        permisosActuales = data.permissions || [];
        console.log("Permisos cargados:", permisosActuales);
      } catch (error) {
        console.error("Error cargando permisos:", error);
        permisosActuales = [];
      }
    }

    function tienePermiso(permiso) {
      return permisosActuales.includes(permiso);
    }

    function mostrarApp() {
      document.getElementById("login-modal").style.display = "none";
      document.getElementById("user-info-panel").style.display = "block";
      document.getElementById("user-display-name").textContent = usuarioActual.username;
      document.getElementById("user-display-role").textContent = `${usuarioActual.role.toUpperCase()}`;
    }

    async function hacerLogout() {
      try {
        await fetch("/logout", { method: "POST" });
      } catch (error) {
        console.error("Error en logout:", error);
      }

      usuarioActual = null;
      permisosActuales = [];

      document.getElementById("login-modal").style.display = "flex";
      document.getElementById("user-info-panel").style.display = "none";

      document.getElementById("login-username").value = "";
      document.getElementById("login-password").value = "";
      document.getElementById("login-error").style.display = "none";

      mostrarToastHUD("👋 Sesión cerrada");
    }

    window.addEventListener("load", async () => {
      try {
        const response = await fetch("/profile");
        if (response.ok) {
          usuarioActual = await response.json();
          await cargarPermisos();
          mostrarApp();
        }
      } catch (error) {
        console.log("No hay sesión activa. Mostrando login.");
      }
    });

    document.getElementById("login-password")?.addEventListener("keypress", (e) => {
      if (e.key === "Enter") hacerLogin();
    });

    document.getElementById("login-username")?.addEventListener("keypress", (e) => {
      if (e.key === "Enter") hacerLogin();
    });
  </script>
</body>
