  <script>
    // =========================
    // AUDIO SFX (tick / click)
    // =========================
    let sfxCtx = null;
    function playSfx(type) {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtx) return;
      if (!sfxCtx) sfxCtx = new AudioCtx();
      if (sfxCtx.state === "suspended") sfxCtx.resume();

      const now = sfxCtx.currentTime;
      const osc = sfxCtx.createOscillator();
      const gain = sfxCtx.createGain();

      const isHover = type === "hover";
      osc.type = isHover ? "triangle" : "sine";
      osc.frequency.value = isHover ? 980 : 520;

      const dur = isHover ? 0.04 : 0.08;
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.16, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + dur);

      osc.connect(gain).connect(sfxCtx.destination);
      osc.start(now);
      osc.stop(now + dur + 0.02);
    }

    function isEntityVisible(el) {
      let current = el;
      while (current && current.tagName !== "A-SCENE") {
        const vis = current.getAttribute("visible");
        if (vis === false || vis === "false") return false;
        current = current.parentElement;
      }
      return true;
    }

    // =========================
    // COMPONENTE INTERACTABLE
    // =========================
    AFRAME.registerComponent("interactable", {
      init: function () {
        this.isHovering = false;
        this.baseScale = null;
        this.baseEmissive = null;

        this.onHoverStart = () => {
          if (this.isHovering) return;
          if (!isEntityVisible(this.el)) return;
          this.isHovering = true;

          if (!this.baseScale) {
            const s = this.el.getAttribute("scale") || { x: 1, y: 1, z: 1 };
            this.baseScale = { x: s.x, y: s.y, z: s.z };
          }

          if (this.baseEmissive === null || this.baseEmissive === undefined) {
            const mat = this.el.getAttribute("material") || {};
            this.baseEmissive = typeof mat.emissiveIntensity === "number" ? mat.emissiveIntensity : 0;
          }

          this.el.setAttribute("scale", {
            x: this.baseScale.x * 1.08,
            y: this.baseScale.y * 1.08,
            z: this.baseScale.z * 1.08
          });
          this.el.setAttribute("material", "emissiveIntensity", this.baseEmissive + 0.35);
          playSfx("hover");
        };

        this.onHoverEnd = () => {
          if (!this.isHovering) return;
          this.isHovering = false;
          if (this.baseScale) this.el.setAttribute("scale", this.baseScale);
          if (this.baseEmissive !== null && this.baseEmissive !== undefined) {
            this.el.setAttribute("material", "emissiveIntensity", this.baseEmissive);
          }
        };

        this.el.addEventListener("mouseenter", this.onHoverStart);
        this.el.addEventListener("mouseleave", this.onHoverEnd);
        this.el.addEventListener("raycaster-intersected", this.onHoverStart);
        this.el.addEventListener("raycaster-intersected-cleared", this.onHoverEnd);

        this.el.addEventListener("click", (e) => {
          let current = this.el;
          let isVisible = true;
          while (current && current.tagName !== "A-SCENE") {
            const vis = current.getAttribute("visible");
            if (vis === false || vis === "false") {
              isVisible = false;
              break;
            }
            current = current.parentElement;
          }
          if (!isVisible) return;
          e.stopPropagation();

          const action = this.el.getAttribute("data-action");
          const param = this.el.getAttribute("data-param");
          if (action) {
            playSfx("click");
            handleClickAction(action, param);
          }
        });
      },
      remove: function () {
        this.el.removeEventListener("mouseenter", this.onHoverStart);
        this.el.removeEventListener("mouseleave", this.onHoverEnd);
        this.el.removeEventListener("raycaster-intersected", this.onHoverStart);
        this.el.removeEventListener("raycaster-intersected-cleared", this.onHoverEnd);
      }
    });

    // =========================
    // COMPONENTE SLOW ROTATION
    // =========================
    AFRAME.registerComponent("slow-rotate", {
      schema: {
        speed: { type: "number", default: 0.3 },
        axis: { type: "string", default: "y" }
      },
      tick: function (time, delta) {
        const rot = this.el.getAttribute("rotation") || { x: 0, y: 0, z: 0 };
        const deg = (delta / 1000) * this.data.speed * 360;
        if (this.data.axis === "y") rot.y += deg;
        else if (this.data.axis === "x") rot.x += deg;
        else rot.z += deg;
        this.el.setAttribute("rotation", rot);
      }
    });

    // =========================
    // COMPONENTE FLOAT-BOB
    // =========================
    AFRAME.registerComponent("float-bob", {
      schema: {
        amp: { type: "number", default: 0.12 },
        speed: { type: "number", default: 1.2 },
        offset: { type: "number", default: 0 }
      },
      init: function () {
        this.baseY = null;
      },
      tick: function (time) {
        if (this.baseY === null) {
          this.baseY = this.el.getAttribute("position").y;
        }
        const y = this.baseY + Math.sin((time / 1000) * this.data.speed + this.data.offset) * this.data.amp;
        const pos = this.el.getAttribute("position");
        this.el.setAttribute("position", { x: pos.x, y: y, z: pos.z });
      }
    });

    // =========================
    // TAMAÑO DINÁMICO DE BOTONES (MÁS GRANDES)
    // =========================
    function calcButtonSize(label, opts = {}) {
      const text = String(label || "");
      const lines = text.split("\n");
      const longest = Math.max(...lines.map(l => l.length), 1);

      const minW = opts.minW ?? 3.4;
      const maxW = opts.maxW ?? 8.5;
      const charW = opts.charW ?? 0.24;

      const width = Math.min(maxW, Math.max(minW, longest * charW + 1.3));
      const height = opts.height ?? (0.9 + lines.length * 0.55);
      const wrap = Math.max(10, Math.floor(width * 4.0));

      return { width, height, wrap, lines: lines.length };
    }
  </script>
</head>

    cursor="rayOrigin: mouse"
    raycaster="objects: .clickable; recursive: true; far: 60"
    background="color: #000"
    fog="type: linear; color: #000; far: 120; near: 0.1"
    xr-mode-ui="XRMode: xr"
  >
    <!-- Luces -->
    <a-light id="light-ambient" type="ambient" intensity="0.5" color="#fff"></a-light>
    <a-light id="light-dir-1" type="directional" intensity="1" color="#00E5FF" position="20 30 20"></a-light>
    <a-light id="light-dir-2" type="directional" intensity="0.6" color="#FF00FF" position="-20 20 -20"></a-light>
    <a-light id="light-point-1" type="point" intensity="0.8" color="#00E5FF" position="7 10 5"></a-light>
    <a-light id="light-point-2" type="point" intensity="0.6" color="#FF00FF" position="7 5 -10"></a-light>

    <!-- Piso y entorno -->
    <a-plane id="teleport-surface" position="7 -3 -4" rotation="-90 0 0" width="240" height="240" color="#0a0a0a" hide-on-enter-ar></a-plane>
    <a-plane id="floor-grid" position="7 -2.97 -4" rotation="-90 0 0" width="240" height="240"
             material="shader: flat; color: #00E5FF; opacity: 0.03" hide-on-enter-ar></a-plane>
    <a-sky id="cielo" color="#050505" hide-on-enter-ar></a-sky>
    <a-entity id="stars" hide-on-enter-ar></a-entity>
    <a-entity id="env-decor" hide-on-enter-ar></a-entity>

    <!-- ESCENA 1: BIENVENIDA -->
    <a-entity id="escena-bienvenida" visible="true">
      <a-entity position="7 5 -15" animation="property: rotation; to: 0 360 0; dur: 20000; easing: linear; loop: true">
        <a-box color="#0a0a0a" depth="1" height="2.5" width="16" opacity="0.92"></a-box>
        <a-text id="titulo-bienvenida-1" value="SISTEMA DE GESTIÓN" align="center" position="0 0.8 0.6" width="21" color="#00E5FF"></a-text>
        <a-text id="titulo-bienvenida-2" value="UNIVERSITARIA" align="center" position="0 0.2 0.6" width="21" color="#00E5FF"></a-text>
      </a-entity>

      <a-entity position="7 3 -10">
        <a-sphere color="#00E5FF" radius="6" opacity="0.1" wireframe="true"
                  animation="property: rotation; to: 0 360 0; dur: 10000; easing: linear; loop: true"></a-sphere>

        <a-entity position="-5 0 0">
          <a-box id="btn-tablas-box" class="clickable" interactable color="#00E5FF" depth="0.8" height="1.2" width="4.2" data-action="mostrarMenuTablas">
            <a-text id="btn-tablas-text" value="VER TABLAS" align="center" position="0 0 0.5" width="6.2" color="#000"></a-text>
          </a-box>
        </a-entity>

        <a-entity position="0 0 0">
          <a-box id="btn-query-box" class="clickable" interactable color="#FF00FF" depth="0.8" height="1.2" width="5.2" data-action="iniciarQueryBuilder">
            <a-text id="btn-query-text" value="CONSTRUIR\nCONSULTA" align="center" position="0 0 0.5" width="6.5" color="#FFF"></a-text>
          </a-box>
        </a-entity>

        <a-entity position="5.3 0 0">
          <a-box id="btn-guiadas-box" class="clickable" interactable color="#00FF88" depth="0.8" height="1.2" width="6" data-action="iniciarConsultasGuiadas">
            <a-text id="btn-guiadas-text" value="CONSULTAS\nGUIADAS" align="center" position="0 0 0.5" width="7" color="#001A0E"></a-text>
          </a-box>
        </a-entity>
      </a-entity>
    </a-entity>

          <a-text value="← VOLVER" align="center" position="0 0 0.3" width="6" color="#FFF"></a-text>

  <script>
    const API_URL = "/pgrest"; // ruta relativa: Flask hace de proxy hacia PostgREST, mismo origen HTTPS
    let tablas = []; // se carga dinámicamente tras login desde /api/my-tables (antes era una lista fija)

    function postgrestFetch(url, options = {}) {
      const headers = Object.assign({}, options.headers || {});
      if (jwtToken) headers["Authorization"] = `Bearer ${jwtToken}`;
      return fetch(url, Object.assign({}, options, { headers }));
    }

    let queryState = {
      step: 1, operation: "", table: "", columns: [],
      whereCol: "", whereVal: "", whereOptions: [],
      orderCol: "", orderDir: "ASC",
      createTableName: "",
      createColumns: []
    };

    let datosActuales = [];
    let paginaActual = 0;
    const filasPorPagina = 6;
    let tablaActual = "";
    let ultimaEscenaDeAnalisis = "escena-consultas-guiadas";

    let qrPaginaActual = 0;
    const qrFilasPorPagina = 5;

    let tablaVista = "2d"; // "2d" | "3d"

    let analisisActual = {
      titulo: "",
      datos: {},
      tipoValor: "count",
      vista: "3d"
    };

    const schemasMock = {
      estudiantes: ["matricula", "nombre", "apellido", "telefono", "correoelectronico", "direccion", "edad"],
      profesores: ["idprofesor", "nombre", "apellido", "correoelectronico", "departamento", "salario"],
      asignaturas: ["idasignatura", "nombre", "creditos", "curso", "semestre", "idprofesor"],
      matriculas: ["matricula", "idasignatura", "fechamatriculacion", "notanumerica", "notatexto"]
    };

    const accionesEnProgreso = new Set();
    const colores = {
      celda:"#1a1a2e",
      celdaTexto:"#00E5FF",
      cabecera:"#0f3460",
      cabeceraTexto:"#00FF88",
      fila_alt:"#16213e"
    };

    // "rol" referencia una clave de PALETAS_UI[entorno].roles, resuelta en iniciarConsultasGuiadas()
    // al momento de pintar las tarjetas (así cambian de color con el entorno activo).
    const CONSULTAS_GUIADAS = [
      { id:"edad-distribucion", label:"Distribución\nde Edades", emoji:"◈", rol:"primario" },
      { id:"edad-prom-curso", label:"Edad Promedio\nGlobal", emoji:"◉", rol:"terciario" },
      { id:"prof-departamento", label:"Profesores por\nDepartamento", emoji:"◆", rol:"secundario" },
      { id:"salario-departamento", label:"Salario Promedio\npor Depto.", emoji:"◈", rol:"ambar" },
      { id:"asignaturas-curso", label:"Asignaturas\npor Curso", emoji:"◉", rol:"violeta" },
      { id:"nota-asignatura", label:"Nota Promedio\npor Asignatura", emoji:"◆", rol:"rosaClaro" }
    ];

    class NavigationManager {
      constructor() {
        this.stack = ["escena-bienvenida"];
      }
      hideAll() {
        [
          "escena-bienvenida",
          "escena-menu-tablas",
          "escena-query-builder",
          "escena-consultas-guiadas",
          "escena-tabla",
          "escena-analisis-edades",
          "escena-query-resultado"
        ].forEach(id => document.getElementById(id).setAttribute("visible", "false"));
      }
      goTo(escena) {
        this.hideAll();
        document.getElementById(escena).setAttribute("visible", "true");
        if (this.stack[this.stack.length - 1] !== escena) this.stack.push(escena);
      }
      goBack() {
        if (this.stack.length > 1) this.stack.pop();
        const prev = this.stack[this.stack.length - 1];
        this.hideAll();
        document.getElementById(prev).setAttribute("visible", "true");
      }
    }
    const nav = new NavigationManager();

    function puedeEjecutarAccion(action) {
      if (accionesEnProgreso.has(action)) return false;
      accionesEnProgreso.add(action);
      setTimeout(() => accionesEnProgreso.delete(action), 250);
      return true;
    }

    function limpiarEntidad(id) {
      const el = document.getElementById(id);
      if (el) el.innerHTML = "";
      return el;
    }

    function normalizeText(v) {
      return String(v ?? "").trim();
    }

    function hslToHex(h, s, l) {
      s /= 100; l /= 100;
      const a = s * Math.min(l, 1 - l);
      const f = n => {
        const k = (n + h / 30) % 12;
        const c = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
        return Math.round(255 * c).toString(16).padStart(2, "0");
      };
      return `#${f(0)}${f(8)}${f(4)}`;
    }

    function crearBoton(label, action, param, bg="#111", color="#FF00FF", width) {
      const e = document.createElement("a-entity");
      const pAttr = param !== undefined ? `data-param="${String(param).replace(/"/g, "&quot;")}"` : "";
      const size = calcButtonSize(label, { maxW: width ?? 7.6 });

      e.innerHTML = `
        <a-box class="clickable" interactable width="${size.width}" height="${size.height}" depth="0.4"
               material="color: ${bg}; emissive: ${color}; emissiveIntensity: 0.32"
               data-action="${action}" ${pAttr}>
          <a-text value="${label}" align="center" position="0 0 0.22"
                  width="${size.width * 1.25}" wrap-count="${size.wrap}"
                  color="#0A0A0A"></a-text>
        </a-box>
      `;
      return e;
    }

    function layoutBotones(cont, opciones, opts = {}) {
      const maxWidth = opts.maxWidth || 18;
      const maxCols = opts.maxCols || 3;
      const gapX = opts.gapX || 1.8;
      const gapY = opts.gapY || 2.4;

      let rows = [];
      let current = [];
      let rowWidth = 0;

      opciones.forEach((op) => {
        const size = (op.w && op.h)
          ? { width: op.w, height: op.h, wrap: Math.max(10, Math.floor(op.w * 4.0)) }
          : calcButtonSize(op.label, { maxW: op.w || 7.6 });
        const w = size.width;

        const nextWidth = current.length === 0 ? w : rowWidth + gapX + w;
        const withinWidth = nextWidth <= maxWidth;
        const withinCols = current.length < maxCols;

        if (current.length === 0 || (withinWidth && withinCols)) {
          current.push({ ...op, _w: w, _h: op.h || size.height, _wrap: size.wrap });
          rowWidth = nextWidth;
        } else {
          rows.push(current);
          current = [{ ...op, _w: w, _h: op.h || size.height, _wrap: size.wrap }];
          rowWidth = w;
        }
      });
      if (current.length) rows.push(current);

      rows.forEach((row, rowIndex) => {
        const totalRowWidth = row.reduce((acc, b) => acc + b._w, 0) + gapX * (row.length - 1);
        let x = -totalRowWidth / 2;

        row.forEach((op) => {
          const ent = document.createElement("a-entity");
          ent.setAttribute("position", `${x + op._w / 2} ${-rowIndex * gapY} 0`);

          // El texto va siempre en negro: usar el mismo color del rol para el brillo del botón Y
          // para la letra hacía que se fundieran en cuanto el tono no era un neón muy saturado
          // (cian/magenta originales sí colaban, ámbar/turquesa/terracota ya no).
          const emisivoDefecto = op.emissive || rolesActuales().primario;
          ent.innerHTML = `
            <a-box class="clickable" interactable
                   width="${op._w}" height="${op._h}" depth="0.35"
                   material="color: #0a1020; emissive: ${emisivoDefecto}; emissiveIntensity: ${op.emissive ? 0.3 : 0.18}"

          `;
          cont.appendChild(ent);
          x += op._w + gapX;
        });
      });

    // Oscurece un color hex (para fondos de tarjetas a partir de su color de acento)
    function oscurecerHex(hex, factor = 0.12) {
      const h = hex.replace("#", "");
      const r = Math.round(parseInt(h.substring(0, 2), 16) * factor);
      const g = Math.round(parseInt(h.substring(2, 4), 16) * factor);
      const b = Math.round(parseInt(h.substring(4, 6), 16) * factor);
      return `#${[r, g, b].map(v => v.toString(16).padStart(2, "0")).join("")}`;
    }

    // Aplica los roles genéricos (primario/secundario/terciario/ambar/violeta/volver...) a todo
    // elemento marcado con data-rol en el HTML: constructor de consultas, consultas guiadas,
    // controles de tabla, análisis y teclado VR. data-rol-target indica cómo aplicarlo:
    // "color" (por defecto) = atributo color plano; "material-emissive" = solo el emissive del
    // material; "material-both" = color y emissive del material a la vez (líneas/bordes que usan
    // el mismo tono para ambos).
    function aplicarRolesEstaticos(nombre) {
      const rol = PALETAS_UI[nombre].roles;

      document.querySelectorAll("[data-rol]").forEach(el => {
        const valor = rol[el.getAttribute("data-rol")];
        if (!valor) return;
        const target = el.getAttribute("data-rol-target") || "color";
        if (target === "material-emissive") {
          el.setAttribute("material", "emissive", valor);
        } else if (target === "material-both") {
          el.setAttribute("material", "color", valor);
          el.setAttribute("material", "emissive", valor);
        } else {
          el.setAttribute("color", valor);
        }
      });

      // Láser de los mandos VR y cilindro de teletransporte
      ["rightController", "leftController"].forEach(id => {
        document.getElementById(id)?.setAttribute("line", "color", rol.primario);
      });
      document.getElementById("leftController")?.setAttribute("teleport-controls", "hitCylinderColor", rol.primario);
    }

    function handleClickAction(action, param) {
      if (!puedeEjecutarAccion(action)) return;

      if (action === "volver") return nav.goBack();

      if (action === "mostrarMenuTablas") return mostrarMenuTablas();
      if (action === "cargarTabla") return cargarTabla(param);
      if (action === "cambiarPagina") return cambiarPagina(parseInt(param, 10));

      if (action === "tabla_ver_3d") return setVistaTabla("3d");
      if (action === "tabla_ver_2d") return setVistaTabla("2d");

      if (action === "iniciarQueryBuilder") return iniciarQueryBuilder();
      if (action === "qb_op") return qb_selOp(param);
      if (action === "qb_tabla") return qb_selTabla(param);
      if (action === "qb_col") return qb_selCol(param);
      if (action === "qb_skip") return qb_skip();
      if (action === "qb_where_col") return qb_selWhereCol(param);
      if (action === "qb_where_val") return qb_selWhereVal(param);
      if (action === "qb_order_col") return qb_selOrderCol(param);
      if (action === "qb_toggle_order_dir") return qb_toggleOrderDir();
      if (action === "qb_ejecutar") return qb_ejecutar();

      if (action === "qb_create_set_name") return qb_create_set_name();
      if (action === "qb_create_add_col") return qb_create_add_col(param);
      if (action === "qb_create_remove_col") return qb_create_remove_col();
      if (action === "qb_create_exec") return qb_create_exec();

      if (action === "iniciarConsultasGuiadas") return iniciarConsultasGuiadas();
      if (action === "ejecutarConsultaGuiada") return ejecutarConsultaGuiada(param);

      if (action === "analisis_ver_3d") return setVistaAnalisis("3d");
      if (action === "analisis_ver_2d") return setVistaAnalisis("2d");

      if (action === "resetVista") return resetVista();

      if (action === "qr_pag") return qr_cambiarPagina(parseInt(param, 10));

      // Teclado VR
      if (action === "vrkb_key") {
        _vrkbText += param;
        _vrkbActualizar();
        return;
      }
      if (action === "vrkb_space") {
        _vrkbText += " ";
        _vrkbActualizar();
        return;
      }
      if (action === "vrkb_back") {
        _vrkbText = _vrkbText.slice(0, -1);
        _vrkbActualizar();
        return;
      }
      if (action === "vrkb_toggle_case") {
        if (_vrkbMode === "num") { _vrkbMode = "upper"; }
        else if (_vrkbMode === "upper") { _vrkbMode = "lower"; }
        else { _vrkbMode = "upper"; }
        _vrkbRenderKeys();
        return;
      }
      if (action === "vrkb_toggle_num") {
        _vrkbMode = _vrkbMode === "num" ? "upper" : "num";
        _vrkbRenderKeys();
        return;
      }
      if (action === "vrkb_confirm") {
        const cb = _vrkbCallback;
        const val = _vrkbText;
        cerrarTecladoVR();
        if (cb) cb(val);
        return;
      }
      if (action === "vrkb_cancel") {
        cerrarTecladoVR();
        return;
      }
    }

        `;
        menu.appendChild(btn);
      });

      menu.setAttribute("slow-rotate", "speed: 0.04; axis: y");
    }

    function iniciarQueryBuilder() {
      nav.goTo("escena-query-builder");
      queryState = {
        step: 1, operation: "", table: "", columns: [],
        whereCol: "", whereVal: "", whereOptions: [],
        orderCol: "", orderDir: "ASC",
        createTableName: "",
        createColumns: []
      };
      limpiarEntidad("query-hint-container");
      actualizarDisplaySQL();
      renderQBOpciones();
    }

    function actualizarDisplaySQL() {
      let sql = "";
      const s = queryState;

      if (s.operation === "SELECT") {
        const cols = s.columns.length ? s.columns.join(", ") : "*";
        sql = `SELECT ${cols}`;
        if (s.table) sql += `\nFROM ${s.table}`;
        if (s.whereCol && s.whereVal !== "") sql += `\nWHERE ${s.whereCol} = '${s.whereVal}'`;
        else if (s.whereCol && !s.whereVal) sql += `\nWHERE ${s.whereCol} = '...'`;
        if (s.orderCol) sql += `\nORDER BY ${s.orderCol} ${s.orderDir}`;
        sql += ";";
      } else if (s.operation === "CREATE_TABLE") {
        const cols = s.createColumns.length
          ? s.createColumns.map(c => `${c.name} ${c.type}`).join(", ")
          : "...";
        sql = `CREATE TABLE ${s.createTableName || "nombre_tabla"} (\n  ${cols}\n);`;
      } else if (s.operation) {
        sql = `${s.operation} ...`;
      }

      document.getElementById("query-display").setAttribute("value", sql || "-- Selecciona una operación");
    }

    function renderQBOpciones() {
      const cont = limpiarEntidad("query-options-container");
      const hint = limpiarEntidad("query-hint-container");
      const ctrlCont = limpiarEntidad("query-control-buttons");
      const titleEl = document.getElementById("query-step-title");
      const rol = rolesActuales();

      let opciones = [];
      let extraButtons = [];

      if (queryState.step === 1) {
        titleEl.setAttribute("value", "PASO 1 · OPERACIÓN SQL");
        const ops = ["SELECT"];
        if (tienePermiso("admin_create_table")) ops.push("CREATE TABLE");

        opciones = ops.map((op, i) => ({
          label: op,
          action: "qb_op",
          param: op,
          emissive: [rol.primario, rol.terciario, rol.ambar, rol.peligro][i],
          textColor: [rol.primario, rol.terciario, rol.ambar, rol.peligro][i]
        }));
      }
      else if (queryState.step === 2 && queryState.operation === "SELECT") {
        titleEl.setAttribute("value", "PASO 2 · TABLA PRINCIPAL");
        opciones = tablas.map(t => ({ label: t.toUpperCase(), action: "qb_tabla", param: t }));
      }
      else if (queryState.step === 3 && queryState.operation === "SELECT") {
        titleEl.setAttribute("value", "PASO 3 · COLUMNAS (selección múltiple)");
        const cols = ["*", ...(schemasMock[queryState.table] || ["id", "nombre"])];
        opciones = cols.map(c => ({
          label: c.toUpperCase(),
          action: "qb_col",
          param: c,
          w: 5.5,
          h: 1.0,
          emissive: queryState.columns.includes(c) ? rol.ambar : rol.primario,
          textColor: queryState.columns.includes(c) ? rol.ambar : rol.primario
        }));
        if (queryState.columns.length > 0) {
          extraButtons.push({ label: "PASO 4 →", action: "qb_skip", bg: "#1A1A2E", color: rol.primario, w: 5 });
        }
      }
      else if (queryState.step === 4 && queryState.operation === "SELECT") {
        titleEl.setAttribute("value", "PASO 4 · FILTRO WHERE (opcional)");
        const cols = schemasMock[queryState.table] || [];
        opciones = cols.map(c => ({ label: `WHERE ${c}`, action: "qb_where_col", param: c }));
        extraButtons.push({ label: "SALTAR WHERE", action: "qb_skip", bg: "#111", color: rol.secundario, w: 5.8 });
      }
      else if (queryState.step === 4.5 && queryState.operation === "SELECT") {
        titleEl.setAttribute("value", `PASO 4.5 · VALOR DE ${queryState.whereCol?.toUpperCase() || "WHERE"}`);
        opciones = queryState.whereOptions.map((v, idx) => ({
          label: `= '${String(v).length > 14 ? String(v).slice(0, 11) + "..." : String(v)}'`,
          action: "qb_where_val",
          param: String(idx)
        }));
        extraButtons.push({ label: "CANCELAR WHERE", action: "qb_skip", bg: "#111", color: rol.secundario, w: 6.0 });
      }
      else if (queryState.step === 5 && queryState.operation === "SELECT") {
        titleEl.setAttribute("value", "PASO 5 · ORDER BY (opcional)");
        const cols = queryState.columns[0] === "*" ? (schemasMock[queryState.table] || []) : queryState.columns;
        opciones = cols.map(c => ({ label: `ORDER ${c}`, action: "qb_order_col", param: c }));
        extraButtons.push({
          label: `DIRECCIÓN: ${queryState.orderDir}`,
          action: "qb_toggle_order_dir",
          bg: "#0E1C2B",
          color: rol.primario,
          w: 6.0
        });
        extraButtons.push({ label: "SALTAR ORDER", action: "qb_skip", bg: "#111", color: rol.secundario, w: 5.6 });
      }
      else if (queryState.step === 6 && queryState.operation === "SELECT") {
        titleEl.setAttribute("value", "✓ QUERY LISTA");
        extraButtons.push({ label: "▶ EJECUTAR QUERY", action: "qb_ejecutar", bg: "#001800", color: rol.terciario, w: 6.5 });

        const t = document.createElement("a-text");
        t.setAttribute("value",
          `Tabla: ${queryState.table.toUpperCase()}  Cols: ${queryState.columns.join(", ")}\n` +
          `WHERE: ${queryState.whereCol || "ninguno"}  ORDER: ${queryState.orderCol ? `${queryState.orderCol} ${queryState.orderDir}` : "ninguno"}`
        );
        t.setAttribute("color", rol.ambar);
        t.setAttribute("align", "center");
        t.setAttribute("width", "10");
        t.setAttribute("position", "0 -2 0");
        hint.appendChild(t);
      }

      else if (queryState.step === 2 && queryState.operation === "CREATE_TABLE") {
        titleEl.setAttribute("value", "PASO 2 · NOMBRE DE TABLA");
        opciones = [{
          label: queryState.createTableName ? `TABLA: ${queryState.createTableName}` : "ELEGIR NOMBRE",
          action: "qb_create_set_name"
        }];
        extraButtons.push({ label: "PASO 3 →", action: "qb_skip", bg: "#1A1A2E", color: rol.primario, w: 5 });
      }
      else if (queryState.step === 3 && queryState.operation === "CREATE_TABLE") {
        titleEl.setAttribute("value", "PASO 3 · COLUMNAS");
        const tipos = ["TEXT", "INTEGER","REAL"];
        opciones = tipos.map(t => ({
          label: `+ ${t}`,
          action: "qb_create_add_col",
          param: t,
          w: 5.5,
          h: 1.0
        }));
        extraButtons.push({ label: "QUITAR ULTIMA", action: "qb_create_remove_col", bg: "#3A1111", color: rol.peligro, w: 6 });
        extraButtons.push({ label: "PASO 4 →", action: "qb_skip", bg: "#1A1A2E", color: rol.primario, w: 5 });
      }
      else if (queryState.step === 4 && queryState.operation === "CREATE_TABLE") {
        titleEl.setAttribute("value", "✓ LISTO PARA CREAR");
        extraButtons.push({ label: "▶ EJECUTAR CREATE", action: "qb_create_exec", bg: "#001800", color: rol.terciario, w: 7 });

        const t = document.createElement("a-text");
        t.setAttribute("value",
          `Tabla: ${queryState.createTableName || "?"}\n` +
          `Columnas: ${queryState.createColumns.map(c => `${c.name} ${c.type}`).join(", ") || "ninguna"}`
        );
        t.setAttribute("color", rol.ambar);
        t.setAttribute("align", "center");
        t.setAttribute("width", "12");
        t.setAttribute("position", "0 -2 0");
        hint.appendChild(t);
      }

      layoutBotones(cont, opciones, { maxCols: 3, gapX: 1.5, gapY: 2.2, maxWidth: 20 });

      const controlBtns = [
        ...extraButtons.map(btn => ({
          label: btn.label, action: btn.action,
          bg: btn.bg, color: btn.color, w: btn.w || 6
        })),
        { label: "← CANCELAR", action: "volver", bg: rol.volver, color: "#FFF", w: 5.0 }
      ];

      const gapControl = 1.2;
      const totalControlW = controlBtns.reduce((a, b) => a + b.w, 0) + gapControl * (controlBtns.length - 1);
      let cx = -totalControlW / 2;

      controlBtns.forEach(btn => {
        const b = crearBoton(btn.label, btn.action, undefined, btn.bg, btn.color, btn.w);
        b.setAttribute("position", `${cx + btn.w / 2} 0 0`);
        ctrlCont.appendChild(b);
        cx += btn.w + gapControl;
      });
    }

    function qb_selOp(op) {
      if (op === "CREATE TABLE") {
        queryState.operation = "CREATE_TABLE";
        queryState.step = 2;
        queryState.createTableName = "";
        queryState.createColumns = [];
      } else {
        queryState.operation = op;
        queryState.step = op === "SELECT" ? 2 : 6;
      }
      actualizarDisplaySQL();
      renderQBOpciones();
    }

    async function qb_selTabla(tabla) {
      queryState.table = tabla;
      document.getElementById("query-step-title").setAttribute("value", "CARGANDO COLUMNAS...");
      limpiarEntidad("query-options-container");

      try {
        const res = await postgrestFetch(`${API_URL}/${tabla}?limit=1`);
        const raw = await res.json();
        const arr = parseApiArray(raw);
        if (arr.length) schemasMock[tabla] = Object.keys(arr[0]);
      } catch (e) {
        console.warn("No se pudieron cargar columnas en vivo. Se usa schema local.");
      }

      queryState.step = queryState.operation === "SELECT" ? 3 : 6;
      actualizarDisplaySQL();
      renderQBOpciones();
    }

    function qb_selCol(col) {
      if (col === "*") {
        queryState.columns = ["*"];
      } else {
        queryState.columns = queryState.columns.filter(c => c !== "*");
        if (queryState.columns.includes(col)) queryState.columns = queryState.columns.filter(c => c !== col);
        else queryState.columns.push(col);
      }
      actualizarDisplaySQL();
      renderQBOpciones();
    }

    async function qb_selWhereCol(col) {
      queryState.whereCol = col;
      queryState.whereVal = "";
      document.getElementById("query-step-title").setAttribute("value", "CARGANDO VALORES...");
      limpiarEntidad("query-options-container");

      try {
        const url = `${API_URL}/${queryState.table}?select=${encodeURIComponent(col)}&${encodeURIComponent(col)}=not.is.null&limit=1000`;
        const res = await postgrestFetch(url);
        const raw = await res.json();
        const arr = parseApiArray(raw);

        const vals = [...new Set(
          arr.map(r => normalizeText(r[col])).filter(v => v !== "")
        )];

        queryState.whereOptions = vals.slice(0, 20);
      } catch {
        queryState.whereOptions = [];
      }

      if (!queryState.whereOptions.length) queryState.whereOptions = ["Sin datos"];
      queryState.step = 4.5;
      actualizarDisplaySQL();
      renderQBOpciones();
    }

    function qb_selWhereVal(idxStr) {
      const idx = parseInt(idxStr, 10);
      queryState.whereVal = queryState.whereOptions[idx] ?? "";
      queryState.step = 5;
      actualizarDisplaySQL();
      renderQBOpciones();
    }

    function qb_selOrderCol(col) {
      queryState.orderCol = col;
      queryState.step = 6;
      actualizarDisplaySQL();
      renderQBOpciones();
    }

    function qb_toggleOrderDir() {
      queryState.orderDir = queryState.orderDir === "ASC" ? "DESC" : "ASC";
      actualizarDisplaySQL();
      renderQBOpciones();
    }

    function qb_skip() {
      if (queryState.operation === "CREATE_TABLE") {
        queryState.step = Math.min(queryState.step + 1, 4);
      } else {
        if (queryState.step === 4.5) {
          queryState.whereCol = "";
          queryState.whereVal = "";
          queryState.step = 5;
        } else {
          queryState.step = Math.min(queryState.step + 1, 6);
        }
      }
      actualizarDisplaySQL();
      renderQBOpciones();
    }

    async function qb_ejecutar() {
      nav.goTo("escena-query-resultado");
      paginaActual = 0;
      qrPaginaActual = 0;
      tablaActual = queryState.table;
      tablaVista = "2d";

      const titulo = `${queryState.operation} ${queryState.table.toUpperCase()}`;
      document.getElementById("qr-titulo").setAttribute("value", titulo);

      try {
        const params = new URLSearchParams();
        if (queryState.columns.length && queryState.columns[0] !== "*") {
          params.set("select", queryState.columns.join(","));
        }
        if (queryState.whereCol && queryState.whereVal !== "" && queryState.whereVal !== undefined) {
          params.set(queryState.whereCol, `eq.${queryState.whereVal}`);
        }
        if (queryState.orderCol) {
          params.set("order", `${queryState.orderCol}.${queryState.orderDir.toLowerCase()}`);
        }
        params.set("limit", "1000");

        const url = `${API_URL}/${queryState.table}?${params.toString()}`;
        const res = await postgrestFetch(url);
        const raw = await res.json();
        datosActuales = res.ok ? parseApiArray(raw) : [];
      } catch (e) {
        console.error("Error de red:", e);
        datosActuales = [];
      }

      // Renderizar tabla (usa las mismas funciones que escena-tabla)
      // pero apuntando a los IDs qr-tabla-cabecera / qr-tabla-cuerpo / qr-label-pagina
      renderQRTabla();
      renderQRGrafico3D();
    }

    // Renderiza la tabla en la escena-query-resultado (misma lógica que renderizarTabla2D/3D
    // pero usando los IDs propios de la escena QR)
    function renderQRTabla() {
      // Reutilizamos renderizarTabla() que ya escribe en tabla-cabecera/tabla-cuerpo/label-pagina
      // Para no duplicar código, temporalmente redirigimos a los IDs QR
      const _cab  = document.getElementById("tabla-cabecera");
      const _cuer = document.getElementById("tabla-cuerpo");
      const _pag  = document.getElementById("label-pagina");

      // Swapear IDs temporalmente
      document.getElementById("qr-tabla-cabecera").id = "tabla-cabecera";
      document.getElementById("qr-tabla-cuerpo").id   = "tabla-cuerpo";
      document.getElementById("qr-label-pagina").id   = "label-pagina";
      _cab.id  = "tabla-cabecera-orig";
      _cuer.id = "tabla-cuerpo-orig";
      _pag.id  = "label-pagina-orig";

      renderizarTabla();

      // Restaurar IDs
      document.getElementById("tabla-cabecera").id = "qr-tabla-cabecera";
      document.getElementById("tabla-cuerpo").id   = "qr-tabla-cuerpo";
      document.getElementById("label-pagina").id   = "qr-label-pagina";
      document.getElementById("tabla-cabecera-orig").id = "tabla-cabecera";
      document.getElementById("tabla-cuerpo-orig").id   = "tabla-cuerpo";
      document.getElementById("label-pagina-orig").id   = "label-pagina";
    }

    // Gráfico 3D rotativo a la izquierda (mismo código que renderGrafico3D)
    function renderQRGrafico3D() {
      const grafCont = document.getElementById("qr-grafico");
      grafCont.innerHTML = "";

      const columnas = datosActuales.length
        ? Object.keys(datosActuales[0])
        : (queryState.columns[0] !== "*" ? queryState.columns : schemasMock[tablaActual] || []);

      if (!datosActuales.length || !columnas.length) {
        const msg = document.createElement("a-text");
        msg.setAttribute("value", "SIN DATOS");
        msg.setAttribute("color", rolesActuales().peligro);
        msg.setAttribute("align", "center");
        msg.setAttribute("width", "6");
        grafCont.appendChild(msg);
        return;
      }

      // Detectar columna numérica y columna de etiqueta
      const colNum = columnas.find(c =>
        datosActuales.slice(0, 20).some(r => r[c] !== null && r[c] !== undefined && !isNaN(Number(r[c])) && String(r[c]).trim() !== "")
      );
      const colGroup = columnas.find(c => c !== colNum) || columnas[0];

      // Agrupar datos
      let datosGrafico = {};
      if (colNum && colGroup) {
        datosActuales.forEach(r => {
          const k = String(r[colGroup] ?? "N/D").slice(0, 10);
          const v = Number(r[colNum]);
          datosGrafico[k] = (datosGrafico[k] || 0) + (Number.isFinite(v) ? v : 1);
        });
      } else {
        datosActuales.forEach(r => {
          const k = String(r[columnas[0]] ?? "N/D").slice(0, 10);
          datosGrafico[k] = (datosGrafico[k] || 0) + 1;
        });
      }
      if (!Object.keys(datosGrafico).length) datosGrafico = { "SIN DATOS": 0 };

      // Reutilizar renderGrafico3D directamente
      renderGrafico3D("qr-grafico", datosGrafico, colNum ? "num" : "count");
    }

    // ==========================================
    // TECLADO VIRTUAL VR
    // ==========================================
    let _vrkbCallback = null;
    let _vrkbText = "";
    const _vrkbShiftRows = [
      ["Q","W","E","R","T","Y","U","I","O","P"],
      ["A","S","D","F","G","H","J","K","L","Ñ"],
      ["Z","X","C","V","B","N","M","_","-","@"]
    ];
    const _vrkbLowerRows = [
      ["q","w","e","r","t","y","u","i","o","p"],
      ["a","s","d","f","g","h","j","k","l","ñ"],
      ["z","x","c","v","b","n","m","_","-","@"]
    ];
    const _vrkbNumRows = [
      ["1","2","3","4","5","6","7","8","9","0"],
      ["!","?","(",")","+","=","/","\\",".",","],
      ["<",">","[","]","{","}","#","$","%","&"]
    ];
    let _vrkbMode = "upper"; // "upper" | "lower" | "num"

    function abrirTecladoVR(titulo, valorInicial, callback) {
      _vrkbCallback = callback;
      _vrkbText = valorInicial || "";
      _vrkbMode = "upper";
      const panel = document.getElementById("vr-keyboard-panel");
      panel.setAttribute("visible", "true");
      // Posicionar frente a la cámara
      const cam = document.querySelector("#camera");
      const rig = document.querySelector("#rig");
      if (cam && rig) {
        const rigPos = rig.getAttribute("position");
        const camRot = cam.getAttribute("rotation") || { x: 0, y: 0, z: 0 };
        const yRad = (camRot.y || 0) * Math.PI / 180;
        panel.setAttribute("position", {
          x: (rigPos.x || 7) - Math.sin(yRad) * 6,
          y: (rigPos.y || 3) + 1,
          z: (rigPos.z || 8) - Math.cos(yRad) * 6
        });
        panel.setAttribute("rotation", { x: 0, y: -(camRot.y || 0), z: 0 });
      }
      document.getElementById("vrkb-title").setAttribute("value", titulo.toUpperCase());
      _vrkbActualizar();
      _vrkbRenderKeys();
    }

    function cerrarTecladoVR() {
      document.getElementById("vr-keyboard-panel").setAttribute("visible", "false");
      _vrkbCallback = null;
    }

    function _vrkbActualizar() {
      const display = _vrkbText || "";
      document.getElementById("vrkb-display").setAttribute("value", display || " ");
      // Mover cursor al final del texto
      const cursorEl = document.getElementById("vrkb-cursor");
      const approxCharW = 0.36;
      const startX = -6.0;
      const cursorX = startX + display.length * approxCharW + 0.18;
      cursorEl.setAttribute("position", `${Math.min(cursorX, 5.8)} 2.2 0.14`);
    }

    function _vrkbRenderKeys() {
      const cont = document.getElementById("vrkb-keys");
      cont.innerHTML = "";
      const rol = rolesActuales();

      const rows = _vrkbMode === "num" ? _vrkbNumRows
                  : _vrkbMode === "upper" ? _vrkbShiftRows
                  : _vrkbLowerRows;

      const keyW = 1.15, keyH = 0.72, gapX = 0.10, gapY = 0.10;
      const rowsTotal = rows.length;

      rows.forEach((row, rowIdx) => {
        const totalW = row.length * keyW + (row.length - 1) * gapX;
        const startX = -totalW / 2 + keyW / 2;
        const y = -(rowIdx * (keyH + gapY));

        row.forEach((char, colIdx) => {
          const x = startX + colIdx * (keyW + gapX);
          const ent = document.createElement("a-entity");
          ent.setAttribute("position", `${x} ${y} 0`);

          const bg = "#0A1828";
          const emissive = rol.primario;
          // El texto va en negro (no del color del rol): con tonos menos neón que el cian/magenta
          // original, letra y brillo del mismo color se fundían y se volvían ilegibles.
          ent.innerHTML = `
            <a-box class="clickable" interactable
                   width="${keyW}" height="${keyH}" depth="0.22"
                   material="color: ${bg}; emissive: ${emissive}; emissiveIntensity: 0.32; opacity: 0.98"
                   data-action="vrkb_key" data-param="${char}">
              <a-text value="${char}" align="center" position="0 0 0.13"
                      width="${keyW * 2.9}" color="#0A0A0A"></a-text>
            </a-box>
          `;
          cont.appendChild(ent);
        });
      });

      // Fila especial: SHIFT/MAYUS | ESPACIO | BORRAR | NÚMEROS
      const bottomY = -(rowsTotal * (keyH + gapY)) - 0.15;
      const specialKeys = [
        { label: _vrkbMode === "num" ? "ABC" : (_vrkbMode === "upper" ? "minús" : "MAYÚS"), param: "vrkb_toggle_case", w: 2.2, color: rol.secundario },
        { label: "ESPACIO", param: "vrkb_space", w: 4.2, color: rol.terciario },
        { label: "⌫", param: "vrkb_back", w: 1.6, color: rol.ambar },
        { label: _vrkbMode === "num" ? "ABC" : "123", param: "vrkb_toggle_num", w: 2.0, color: rol.violeta }
      ];
      const totalSpecialW = specialKeys.reduce((a, k) => a + k.w, 0) + (specialKeys.length - 1) * 0.15;
      let sx = -totalSpecialW / 2;
      specialKeys.forEach(k => {
        const ent = document.createElement("a-entity");
        ent.setAttribute("position", `${sx + k.w / 2} ${bottomY} 0`);
        ent.innerHTML = `
          <a-box class="clickable" interactable
                 width="${k.w}" height="${keyH}" depth="0.22"
                 material="color: #0D0020; emissive: ${k.color}; emissiveIntensity: 0.4; opacity: 0.98"
                 data-action="${k.param}">
            <a-text value="${k.label}" align="center" position="0 0 0.13"
                    width="${k.w * 2.2}" color="#0A0A0A"></a-text>
          </a-box>
        `;
        cont.appendChild(ent);
        sx += k.w + 0.15;
      });

      // Botones CONFIRMAR / CANCELAR
      const actCont = document.getElementById("vrkb-actions");
      actCont.innerHTML = `
        <a-entity position="-2.2 0 0">
          <a-box class="clickable" interactable width="4.0" height="0.78" depth="0.22"
                 material="color: #001800; emissive: ${rol.terciario}; emissiveIntensity: 0.55; opacity: 0.98"
                 data-action="vrkb_confirm">
            <a-text value="✓ CONFIRMAR" align="center" position="0 0 0.13" width="7.5" color="#0A0A0A"></a-text>
          </a-box>
        </a-entity>
        <a-entity position="2.6 0 0">
          <a-box class="clickable" interactable width="4.0" height="0.78" depth="0.22"
                 material="color: #1A0000; emissive: ${rol.peligro}; emissiveIntensity: 0.5; opacity: 0.98"
                 data-action="vrkb_cancel">

    async function fetchAll(endpoint, select = "*") {
      try {
        const url = `${API_URL}/${endpoint}?select=${encodeURIComponent(select)}&limit=2000`;
        const res = await postgrestFetch(url);
        const raw = await res.json();
        if (!res.ok) throw new Error(JSON.stringify(raw));
        return parseApiArray(raw);
      } catch (e) {
        console.error(`Error fetchAll(${endpoint}):`, e);
        return [];
      }
    }

    function toNum(v) {
      const n = Number(v);
      return Number.isFinite(n) ? n : NaN;
    }

    function groupCount(rows, key) {
      const out = {};
      rows.forEach(r => {
        const k = normalizeText(r[key]) || "N/D";
        out[k] = (out[k] || 0) + 1;
      });
      return out;
    }

    function groupAvg(rows, keyGroup, keyValue) {
      const acc = {};
      rows.forEach(r => {
        const g = normalizeText(r[keyGroup]) || "N/D";
        const n = toNum(r[keyValue]);
        if (!Number.isFinite(n)) return;
        if (!acc[g]) acc[g] = { sum: 0, count: 0 };
        acc[g].sum += n;
        acc[g].count += 1;
      });
      const out = {};
      Object.keys(acc).forEach(g => {
        out[g] = Number((acc[g].sum / acc[g].count).toFixed(2));
      });
      return out;
    }

    function statsFromValues(values) {
      const nums = values.map(toNum).filter(n => Number.isFinite(n));
      if (!nums.length) return { min: "--", max: "--", avg: "--", total: 0 };
      const min = Math.min(...nums);
      const max = Math.max(...nums);
      const avg = (nums.reduce((a, b) => a + b, 0) / nums.length).toFixed(2);
      return { min, max, avg, total: nums.length };
    }

    async function ejecutarConsultaGuiada(tipo) {
      ultimaEscenaDeAnalisis = "escena-consultas-guiadas";
      nav.goTo("escena-analisis-edades");

      let titulo = "ANÁLISIS";
      let datosGrafico = {};
      let stats = { min: "--", max: "--", avg: "--", total: 0 };
      let tipoValor = "count";

      if (tipo === "edad-distribucion") {
        titulo = "DISTRIBUCIÓN DE EDADES";
        const rows = await fetchAll("estudiantes", "edad");
        datosGrafico = groupCount(rows, "edad");
        const s = statsFromValues(rows.map(r => r.edad));
        stats = { ...s, total: rows.length };
        tipoValor = "count";
      }
      else if (tipo === "edad-prom-curso") {
        titulo = "EDAD (MIN / MAX / PROM)";
        const rows = await fetchAll("estudiantes", "edad");
        const s = statsFromValues(rows.map(r => r.edad));
        datosGrafico = {
          "MIN": Number.isFinite(Number(s.min)) ? Number(s.min) : 0,
          "PROM": Number.isFinite(Number(s.avg)) ? Number(s.avg) : 0,
          "MAX": Number.isFinite(Number(s.max)) ? Number(s.max) : 0
        };
        stats = { ...s, total: rows.length };
        tipoValor = "num";
      }
      else if (tipo === "prof-departamento") {
        titulo = "PROFESORES POR DEPARTAMENTO";
        const rows = await fetchAll("profesores", "departamento");
        datosGrafico = groupCount(rows, "departamento");
        const counts = Object.values(datosGrafico);
        const s = statsFromValues(counts);
        stats = { ...s, total: rows.length };
        tipoValor = "count";
      }
      else if (tipo === "salario-departamento") {
        titulo = "SALARIO PROMEDIO POR DEPTO.";
        const rows = await fetchAll("profesores", "departamento,salario");
        datosGrafico = groupAvg(rows, "departamento", "salario");
        const vals = Object.values(datosGrafico);
        const s = statsFromValues(vals);
        stats = { ...s, total: rows.length };
        tipoValor = "num";
      }
      else if (tipo === "asignaturas-curso") {
        titulo = "ASIGNATURAS POR CURSO";
        const rows = await fetchAll("asignaturas", "curso");
        datosGrafico = groupCount(rows, "curso");
        const vals = Object.values(datosGrafico);
        const s = statsFromValues(vals);
        stats = { ...s, total: rows.length };
        tipoValor = "count";
      }
      else if (tipo === "nota-asignatura") {
        titulo = "NOTA PROMEDIO POR ASIGNATURA";
        const rows = await fetchAll("matriculas", "idasignatura,notanumerica");
        datosGrafico = groupAvg(rows, "idasignatura", "notanumerica");
        const vals = Object.values(datosGrafico);
        const s = statsFromValues(vals);
        stats = { ...s, total: rows.length };
        tipoValor = "num";
      }

      if (!Object.keys(datosGrafico).length) {
        datosGrafico = { "SIN DATOS": 0 };
      }

      document.getElementById("titulo-analisis").setAttribute("value", titulo);
      document.getElementById("stat-edad-min").setAttribute("value", `MIN: ${stats.min}`);
      document.getElementById("stat-edad-max").setAttribute("value", `MÁX: ${stats.max}`);
      document.getElementById("stat-edad-prom").setAttribute("value", `PROM: ${stats.avg}`);
      document.getElementById("stat-total").setAttribute("value", `TOTAL: ${stats.total}`);

      analisisActual.titulo = titulo;
      analisisActual.datos = datosGrafico;
      analisisActual.tipoValor = tipoValor;

      setVistaAnalisis(analisisActual.vista || "3d");

    function setVistaAnalisis(vista) {
      analisisActual.vista = vista;
      const graf = document.getElementById("grafico-edades");

    }

        paginaActual = next;

        if (qrVisible === true || qrVisible === "true") {
          renderQRTabla();

          renderizarTabla();

    function renderGrafico3D(containerId, datos, tipo = "count") {
      const cont = document.getElementById(containerId);
      if (!cont) return;
      cont.innerHTML = "";
      const rol = rolesActuales();

      const claves = Object.keys(datos);
      const valores = Object.values(datos).map(v => Number(v) || 0);

      if (!claves.length) return;

      const maxVal = Math.max(...valores, 1);
      const altMax = 4.8;
      const radius = Math.max(3.2, claves.length * 0.52);

      claves.forEach((clave, i) => {
        const val = Number(datos[clave]) || 0;
        const altBarra = Math.max(0.08, (val / maxVal) * altMax);

        const angle = (i / claves.length) * Math.PI * 2;
        const x = Math.cos(angle) * radius;
        const z = Math.sin(angle) * radius;
        const y = altBarra / 2 - 2;

        const hue = Math.round((i / claves.length) * 360);
        const colorHex = hslToHex(hue, 88, 58);

        const bobSpeed = 0.6 + (i % 3) * 0.25;
        const bobAmp = 0.06 + (i % 2) * 0.04;
        const bobOffset = i * 0.8;

        const ent = document.createElement("a-entity");
        ent.setAttribute("position", `${x} ${y} ${z}`);
        ent.setAttribute("float-bob", `amp: ${bobAmp}; speed: ${bobSpeed}; offset: ${bobOffset}`);

        ent.innerHTML = `
          <a-box width="0.78" height="${altBarra}" depth="0.78"
                 material="color: ${colorHex}; emissive: ${colorHex}; emissiveIntensity: 0.30; opacity: 0.90"></a-box>

          <a-box width="0.86" height="0.07" depth="0.86"
                 position="0 ${altBarra / 2} 0"
                 material="color: #ffffff; emissive: ${colorHex}; emissiveIntensity: 0.9; opacity: 0.95"></a-box>

          <a-cylinder radius="0.55" height="0.04"
                      position="0 ${-altBarra / 2} 0"
                      material="color: ${colorHex}; emissive: ${colorHex}; emissiveIntensity: 0.7; opacity: 0.4"></a-cylinder>

          <a-text value="${String(clave).length > 10 ? String(clave).slice(0, 9) + '…' : clave}"
                  position="0 ${-altBarra / 2 - 0.62} 0"
                  color="${rol.primario}" align="center" width="4.2"></a-text>

          <a-text value="${tipo === 'num' ? Number(val).toFixed(2) : val}"
                  position="0 ${altBarra / 2 + 0.52} 0"
                  color="${rol.ambar}" align="center" width="4.2"></a-text>
        `;

        cont.appendChild(ent);
      });

      const base = document.createElement("a-cylinder");
      base.setAttribute("radius", radius + 0.8);
      base.setAttribute("height", "0.04");
      base.setAttribute("position", "0 -2 0");
      base.setAttribute("material", `color: ${rol.primario}; opacity: 0.05; wireframe: true`);
      cont.appendChild(base);

      const ring = document.createElement("a-torus");
      ring.setAttribute("radius", radius + 0.8);
      ring.setAttribute("radius-tubular", "0.03");
      ring.setAttribute("position", "0 -2 0");
      ring.setAttribute("material", `color: ${rol.primario}; emissive: ${rol.primario}; emissiveIntensity: 0.5; opacity: 0.3`);
      cont.appendChild(ring);
    }

    function renderGrafico2D(containerId, datos, tipo = "count") {
      const cont = document.getElementById(containerId);
      if (!cont) return;
      cont.innerHTML = "";
      const rol = rolesActuales();

      const claves = Object.keys(datos);
      const valores = Object.values(datos).map(v => Number(v) || 0);
      if (!claves.length) return;

      const maxVal = Math.max(...valores, 1);
      const chartWidth = 12;
      const chartHeight = 4.8;
      const gap = 0.35;
      const barW = Math.max(0.35, (chartWidth - gap * (claves.length - 1)) / claves.length);

      const panel = document.createElement("a-plane");
      panel.setAttribute("width", String(chartWidth + 1.2));
      panel.setAttribute("height", "6.2");
      panel.setAttribute("position", "0 0.6 -0.02");
      panel.setAttribute("material", "color: #070B12; opacity: 0.65; side: double");
      cont.appendChild(panel);

      const ejeX = document.createElement("a-box");
      ejeX.setAttribute("width", String(chartWidth + 0.2));
      ejeX.setAttribute("height", "0.03");
      ejeX.setAttribute("depth", "0.03");
      ejeX.setAttribute("position", "0 -2 0");
      ejeX.setAttribute("color", rol.primario);
      cont.appendChild(ejeX);

      const ejeY = document.createElement("a-box");
      ejeY.setAttribute("width", "0.03");
      ejeY.setAttribute("height", String(chartHeight + 0.2));
      ejeY.setAttribute("depth", "0.03");
      ejeY.setAttribute("position", `${-(chartWidth/2)} ${-2 + chartHeight/2} 0`);
      ejeY.setAttribute("color", rol.primario);
      cont.appendChild(ejeY);

      claves.forEach((k, i) => {
        const v = Number(datos[k]) || 0;
        const h = Math.max(0.05, (v / maxVal) * chartHeight);

        const x = -(chartWidth / 2) + (barW / 2) + i * (barW + gap);
        const y = -2 + h / 2;

        const hue = Math.round((i / claves.length) * 360);
        const colorHex = hslToHex(hue, 88, 58);

        const bar = document.createElement("a-box");
        bar.setAttribute("width", String(barW));
        bar.setAttribute("height", String(h));
        bar.setAttribute("depth", "0.08");
        bar.setAttribute("position", `${x} ${y} 0.02`);
        bar.setAttribute("material", `color: ${colorHex}; emissive: ${colorHex}; emissiveIntensity: 0.2; opacity: 0.95`);
        cont.appendChild(bar);

        const label = document.createElement("a-text");
        label.setAttribute("value", String(k).length > 8 ? String(k).slice(0, 8) + "…" : k);
        label.setAttribute("position", `${x} -2.35 0.03`);
        label.setAttribute("align", "center");
        label.setAttribute("width", "3.2");
        label.setAttribute("color", rol.primario);
        cont.appendChild(label);

        const valLabel = document.createElement("a-text");
        valLabel.setAttribute("value", tipo === "num" ? Number(v).toFixed(2) : String(v));
        valLabel.setAttribute("position", `${x} ${y + h/2 + 0.28} 0.03`);
        valLabel.setAttribute("align", "center");
        valLabel.setAttribute("width", "3.2");
        valLabel.setAttribute("color", rol.ambar);
        cont.appendChild(valLabel);
      });
    }

    // ============ AUTENTICACIÓN Y PERMISOS ============

    let usuarioActual = null;
    let permisosActuales = [];
    let jwtToken = null;
    let misPermisosTablas = {}; // { nombreTabla: {can_read, can_write} }

    async function hacerLogin() {
      const username = document.getElementById("login-username").value.trim();
      const password = document.getElementById("login-password").value;
      const errorDiv = document.getElementById("login-error");
      const loginBtn = document.getElementById("login-btn");

      if (!username || !password) {
        errorDiv.textContent = "❌ Usuario y contraseña requeridos";
        errorDiv.style.display = "block";
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = "Conectando...";

      try {
        const response = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (!response.ok) {
          errorDiv.textContent = `❌ ${data.error || "Credenciales inválidas"}`;
          errorDiv.style.display = "block";
          loginBtn.disabled = false;
          loginBtn.textContent = "▶ ENTRAR";
          return;
        }

        usuarioActual = data;
        jwtToken = data.token;
        await Promise.all([cargarPermisos(), cargarMisTablas()]);
        mostrarApp();
        mostrarToastHUD(`✅ Bienvenido, ${data.username}!`);

      } catch (error) {
        console.error("Error en login:", error);
        errorDiv.textContent = "❌ Error de conexión";
        errorDiv.style.display = "block";
        loginBtn.disabled = false;
        loginBtn.textContent = "▶ ENTRAR";
      }
    }

    async function cargarPermisos() {
      try {
        const response = await fetch("/permissions");
        const data = await response.json();
        permisosActuales = data.permissions || [];
        console.log("Permisos cargados:", permisosActuales);
      } catch (error) {
        console.error("Error cargando permisos:", error);
        permisosActuales = [];
      }
    }

    function tienePermiso(permiso) {
      return permisosActuales.includes(permiso);
    }

    async function cargarMisTablas() {
      try {
        const response = await fetch("/api/my-tables");
        const data = await response.json();
        const info = data.tables || [];
        tablas = info.map(t => t.table);
        misPermisosTablas = {};
        info.forEach(t => { misPermisosTablas[t.table] = { can_read: t.can_read, can_write: t.can_write }; });
        console.log("Tablas accesibles:", tablas);
      } catch (error) {
        console.error("Error cargando tablas del usuario:", error);
        tablas = [];
        misPermisosTablas = {};
      }
    }

    function puedeEscribirTabla(tabla) {
      return !!(misPermisosTablas[tabla] && misPermisosTablas[tabla].can_write);
    }

    // ============ ADMIN: CREAR USUARIOS CON PERMISOS POR TABLA ============

    let rolesDisponibles = {};   // { role_name: [{table, can_write}, ...] }, desde /api/admin/roles
    let tablasDisponibles = [];  // todas las tablas del sistema, desde /api/admin/tables

    async function abrirPanelAdminUsuarios() {
      document.getElementById("admin-new-username").value = "";
      document.getElementById("admin-new-password").value = "";
      document.getElementById("admin-new-role").value = "profesor";
      document.getElementById("admin-new-role-custom").value = "";
      document.getElementById("admin-new-role-custom").style.display = "none";
      document.getElementById("admin-new-user-error").style.display = "none";

      try {
        const [resTablas, resRoles] = await Promise.all([
          fetch("/api/admin/tables"),
          fetch("/api/admin/roles")
        ]);
        if (!resTablas.ok || !resRoles.ok) throw new Error("No autorizado o error de servidor");
        tablasDisponibles = (await resTablas.json()).tables || [];
        rolesDisponibles = (await resRoles.json()).roles || {};
      } catch (e) {
        mostrarToastHUD("❌ Error cargando tablas/roles");
        return;
      }

      renderTablaPermisosChecklist();
      onCambioRolNuevoUsuario();
      document.getElementById("admin-users-modal").style.display = "flex";
    }

    function cerrarPanelAdminUsuarios() {
      document.getElementById("admin-users-modal").style.display = "none";
    }

    function renderTablaPermisosChecklist() {
      const cont = document.getElementById("admin-tabla-permisos-list");
      cont.innerHTML = "";
      tablasDisponibles.forEach(tabla => {
        const row = document.createElement("div");
        row.style.cssText = "display:flex; align-items:center; justify-content:space-between; padding:5px 0; border-bottom:1px solid #0a2030;";
        row.innerHTML = `
          <span style="color:#FFF; font-size:12px;">${tabla}</span>
          <span style="font-size:11px; color:#00E5FF;">
            <label style="margin-right:12px; cursor:pointer;"><input type="checkbox" class="perm-read" data-tabla="${tabla}"> Lectura</label>
            <label style="cursor:pointer;"><input type="checkbox" class="perm-write" data-tabla="${tabla}"> Escritura</label>
          </span>
        `;
        cont.appendChild(row);
      });

      // Marcar "Escritura" implica marcar también "Lectura"
      cont.querySelectorAll(".perm-write").forEach(cb => {
        cb.addEventListener("change", () => {
          if (cb.checked) {
            cont.querySelector(`.perm-read[data-tabla="${cb.dataset.tabla}"]`).checked = true;
          }
        });
      });
    }

    function onCambioRolNuevoUsuario() {
      const select = document.getElementById("admin-new-role");
      const rol = select.value;
      document.getElementById("admin-new-role-custom").style.display = rol === "otro" ? "block" : "none";

      const cont = document.getElementById("admin-tabla-permisos-list");
      cont.querySelectorAll(".perm-read").forEach(cb => cb.checked = false);
      cont.querySelectorAll(".perm-write").forEach(cb => cb.checked = false);

      (rolesDisponibles[rol] || []).forEach(d => {
        const readCb = cont.querySelector(`.perm-read[data-tabla="${d.table}"]`);
        const writeCb = cont.querySelector(`.perm-write[data-tabla="${d.table}"]`);
        if (readCb) readCb.checked = true;
        if (writeCb) writeCb.checked = !!d.can_write;
      });
    }

    async function crearUsuarioAdmin() {
      const username = document.getElementById("admin-new-username").value.trim();
      const password = document.getElementById("admin-new-password").value;
      const select = document.getElementById("admin-new-role");
      const role = select.value === "otro"
        ? document.getElementById("admin-new-role-custom").value.trim()
        : select.value;
      const errorDiv = document.getElementById("admin-new-user-error");

      const cont = document.getElementById("admin-tabla-permisos-list");
      const table_permissions = [];
      cont.querySelectorAll(".perm-read").forEach(cb => {
        if (cb.checked) {
          const tabla = cb.dataset.tabla;
          const writeCb = cont.querySelector(`.perm-write[data-tabla="${tabla}"]`);
          table_permissions.push({ table: tabla, can_read: true, can_write: writeCb.checked });
        }
      });

      if (!username || !password || !role) {
        errorDiv.textContent = "❌ Usuario, contraseña y rol son obligatorios";
        errorDiv.style.display = "block";
        return;
      }
      if (table_permissions.length === 0) {
        errorDiv.textContent = "❌ Selecciona al menos una tabla";
        errorDiv.style.display = "block";
        return;
      }

      try {
        const resp = await fetch("/api/admin/users", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password, role, table_permissions })
        });
        const data = await resp.json();
        if (!resp.ok) {
          errorDiv.textContent = `❌ ${data.error || "Error creando usuario"}`;
          errorDiv.style.display = "block";
          return;
        }
        mostrarToastHUD(`✅ Usuario ${username} creado`);
        cerrarPanelAdminUsuarios();
      } catch (e) {
        errorDiv.textContent = "❌ Error de red";
        errorDiv.style.display = "block";
      }
    }

    function mostrarApp() {
      document.getElementById("login-modal").style.display = "none";
      document.getElementById("user-info-panel").style.display = "block";
      document.getElementById("user-display-name").textContent = usuarioActual.username;
      document.getElementById("user-display-role").textContent = `${usuarioActual.role.toUpperCase()}`;
      document.getElementById("admin-users-btn").style.display =
        usuarioActual.role === "admin" ? "block" : "none";
    }

    async function hacerLogout() {
      try {
        await fetch("/logout", { method: "POST" });
      } catch (error) {
        console.error("Error en logout:", error);
      }

      usuarioActual = null;
      permisosActuales = [];
      jwtToken = null;
      misPermisosTablas = {};
      tablas = [];

      document.getElementById("login-modal").style.display = "flex";
      document.getElementById("user-info-panel").style.display = "none";

      document.getElementById("login-username").value = "";
      document.getElementById("login-password").value = "";
      document.getElementById("login-error").style.display = "none";

      mostrarToastHUD("👋 Sesión cerrada");
    }

    window.addEventListener("load", async () => {
      try {
        const response = await fetch("/profile");
        if (response.ok) {
          usuarioActual = await response.json();
          const tokenResp = await fetch("/api/token");
          if (tokenResp.ok) {
            jwtToken = (await tokenResp.json()).token;
          }
          await Promise.all([cargarPermisos(), cargarMisTablas()]);
          mostrarApp();
        }
      } catch (error) {
        console.log("No hay sesión activa. Mostrando login.");
      }
    });

    document.getElementById("login-password")?.addEventListener("keypress", (e) => {
      if (e.key === "Enter") hacerLogin();
    });

    document.getElementById("login-username")?.addEventListener("keypress", (e) => {
      if (e.key === "Enter") hacerLogin();
    });
  </script>
</body>
</html>
