<rect x="360" y="872" width="16" height="16" fill="#f5f5f5" stroke="#525252"/>
<text x="384" y="884" font-size="11.5" fill="#525252">Fuera del flujo normal de la app (uso del desarrollador)</text>
<text x="40" y="914" font-size="11.5" fill="#334155">La app nunca habla directamente con PostgreSQL ni con PostgREST: todo pasa por Flask (unico servicio con HTTPS).</text>
<text x="40" y="932" font-size="11.5" fill="#334155">Quien decide que puede leer o escribir cada usuario es PostgreSQL, mediante GRANT/REVOKE sobre su rol app_user_N.</text>
